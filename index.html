<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F7F8FA;--white:#FFFFFF;--surface:#F0F2F5;--border:#E4E7EC;
  --text:#0D0F12;--muted:#6B7280;--dim:#9CA3AF;
  --primary:#4F6EF7;--primary-light:#EEF1FE;--primary-dark:#3B56D9;
  --green:#22C55E;--green-light:#DCFCE7;--green-dark:#16A34A;
  --red:#EF4444;--red-light:#FEE2E2;--red-dark:#991B1B;
  --yellow:#F59E0B;--yellow-light:#FEF3C7;
  --purple:#8B5CF6;--purple-light:#EDE9FE;
  --r:14px;--r-sm:10px;--r-full:999px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--text);overflow:hidden;}
.layout{display:flex;height:100vh;overflow:hidden;}
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.sidebar{width:250px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sb-top{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-logo{font-size:17px;font-weight:800;}
.sb-logo span{color:var(--primary);}
.sb-level-wrap{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-level-name{font-size:13px;font-weight:700;margin-bottom:1px;}
.sb-level-xp{font-size:11px;color:var(--muted);margin-bottom:6px;}
.sb-prog-track{height:5px;background:var(--surface);border-radius:99px;overflow:hidden;}
.sb-prog-fill{height:5px;border-radius:99px;transition:width .4s;}
.sb-lessons{flex:1;overflow-y:auto;padding-bottom:12px;}
.sb-lessons::-webkit-scrollbar{display:none;}
.sb-phase{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:12px 16px 4px;}
.sb-lesson{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;transition:background .12s;}
.sb-lesson:hover{background:var(--surface);}
.sb-lesson.sb-active{background:var(--primary-light);}
.sb-lesson.sb-locked{opacity:.4;cursor:default;}
.sb-l-icon{font-size:15px;flex-shrink:0;}
.sb-l-info{flex:1;min-width:0;}
.sb-l-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-l-pct{font-size:10px;margin-top:1px;}
.sb-l-check{font-size:11px;color:var(--green);flex-shrink:0;font-weight:700;}
.sb-exam{display:flex;align-items:center;gap:8px;margin:5px 12px 2px;padding:8px 10px;cursor:pointer;border-radius:var(--r-sm);background:var(--primary-light);transition:background .12s;}
.sb-exam:hover{filter:brightness(.97);}
.sb-exam.passed{background:var(--green-light);}
.sb-exam .sb-l-name{color:var(--primary-dark);}
.sb-exam.passed .sb-l-name{color:var(--green-dark);}
.sb-exam .sb-l-pct{color:var(--muted);}
.mobile-header{display:none;background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;align-items:center;justify-content:space-between;flex-shrink:0;}
@media(max-width:768px){.sidebar{display:none;}.mobile-header{display:flex!important;}}
.level-strip{background:var(--white);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;}
.level-emoji{font-size:26px;}
.level-info{flex:1;min-width:0;}
.level-name{font-size:14px;font-weight:700;margin-bottom:1px;}
.level-xp-row{font-size:11px;color:var(--muted);margin-bottom:5px;}
.level-track{height:5px;background:var(--surface);border-radius:99px;overflow:hidden;}
.level-fill{height:5px;border-radius:99px;transition:width .4s;}
.mastery-bar{height:3px;background:var(--surface);border-radius:99px;margin-top:6px;overflow:hidden;}
.mastery-fill{height:3px;border-radius:99px;transition:width .4s;}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
@media(min-width:520px){.stat-row{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:var(--white);border-radius:var(--r);padding:12px 8px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;gap:3px;}
.stat-ico{font-size:24px;height:46px;display:flex;align-items:center;justify-content:center;}
.stat-val{font-size:18px;font-weight:800;line-height:1.1;}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.goal-ring{width:46px;height:46px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p,0)*1%),var(--surface) 0);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.goal-ring-inner{width:34px;height:34px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--green-dark);}
.sb-stats{display:flex;gap:8px;padding:12px 16px 0;}
.sb-stat{flex:1;background:var(--surface);border-radius:var(--r-sm);padding:7px 4px;text-align:center;font-size:10px;color:var(--muted);font-weight:600;display:flex;flex-direction:column;align-items:center;gap:1px;}
.sb-stat b{font-size:16px;color:var(--text);font-weight:800;}
.sb-goal-wrap{padding:10px 16px 2px;}
.sb-goal-top{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px;}
.sb-goal-track{height:5px;background:var(--surface);border-radius:99px;overflow:hidden;}
.sb-goal-fill{height:5px;border-radius:99px;background:var(--green);transition:width .4s;}
.exam-card{background:linear-gradient(135deg,var(--primary),var(--purple));border-radius:var(--r);padding:16px;margin:6px 0 10px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow-md);color:#fff;-webkit-user-select:none;transition:transform .15s;}
.exam-card:active{transform:scale(.98);}
.exam-card.passed{background:linear-gradient(135deg,var(--green),var(--green-dark));}
.exam-ico{font-size:26px;flex-shrink:0;}
.exam-info{flex:1;min-width:0;}
.exam-title{font-size:14px;font-weight:800;}
.exam-sub{font-size:12px;opacity:.92;margin-top:1px;}
.exam-go{font-size:20px;font-weight:800;opacity:.9;}
.exam-q-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:10px;}
.exam-review-item{background:var(--white);border-radius:var(--r-sm);padding:12px;margin-bottom:8px;box-shadow:var(--shadow);border-left:4px solid var(--red);}
.learn-h{font-size:13px;font-weight:700;color:var(--primary-dark);margin:16px 0 8px;padding-left:2px;}
.callout{border-radius:var(--r-sm);padding:11px 14px;margin-bottom:12px;border-left:4px solid;font-size:13px;line-height:1.65;color:var(--text);}
.callout-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.callout.hook{background:var(--purple-light);border-color:var(--purple);}
.callout.hook .callout-t{color:var(--purple);}
.callout.watch{background:var(--red-light);border-color:var(--red);}
.callout.watch .callout-t{color:var(--red-dark);}
.callout.tip{background:var(--primary-light);border-color:var(--primary);}
.callout.tip .callout-t{color:var(--primary-dark);}
.takeaway-box{background:var(--green-light);border-radius:var(--r-sm);padding:11px 14px;margin-bottom:12px;}
.takeaway-box .callout-t{color:var(--green-dark);margin-bottom:6px;}
.takeaway-box ul{margin:0;padding-left:18px;}
.takeaway-box li{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:4px;}
.selfcheck{background:var(--surface);border-radius:var(--r-sm);padding:14px;margin-bottom:14px;}
.lessons-grid{display:grid;gap:8px;margin-bottom:4px;}
@media(min-width:769px){.lessons-grid{grid-template-columns:1fr 1fr;}}
.err-sent-box{background:var(--red-light);border:2px solid var(--red);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;font-size:13.5px;font-weight:500;line-height:1.7;color:var(--red-dark);}
.sl-grid{display:grid;gap:10px;margin-bottom:16px;}
@media(min-width:769px){.sl-grid{grid-template-columns:1fr 1fr;}}
.sl-card{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);cursor:pointer;border:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:12px;-webkit-user-select:none;}
.sl-card:active{transform:scale(.98);}
.sl-card.sl-done{border-color:var(--green);}
.sl-icon{width:42px;height:42px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sl-info{flex:1;min-width:0;}
.sl-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.sl-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.sl-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.sl-badge.done{background:var(--green);color:white;}
.sl-badge.go{background:var(--primary-light);color:var(--primary);font-size:14px;}
.exp-section{margin-bottom:16px;}
.exp-h{font-size:13px;font-weight:700;color:var(--primary-dark);margin-bottom:8px;padding-left:2px;}
.exp-point{display:flex;gap:10px;padding:10px 12px;background:var(--surface);border-radius:var(--r-sm);margin-bottom:6px;}
.exp-point-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.exp-point-body{flex:1;}
.exp-point-t{font-size:12px;font-weight:700;margin-bottom:2px;}
.exp-point-d{font-size:12px;color:var(--muted);line-height:1.55;}
.exp-point-e{font-size:12px;color:var(--muted);font-weight:600;font-style:italic;margin-top:3px;}
.exp-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0;}
.exp-table th{background:var(--surface);padding:7px 10px;text-align:left;font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;}
.exp-table td{padding:7px 10px;border-top:1px solid var(--border);vertical-align:top;line-height:1.5;}
.exp-table tr:nth-child(even) td{background:var(--surface);}
.comp-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--r-full);margin-top:4px;}
.comp-pill.done{background:var(--green-light);color:var(--green-dark);}
.comp-pill.part{background:var(--primary-light);color:var(--primary-dark);}
.comp-pill.none{background:var(--surface);color:var(--muted);}
.sl-comp-row{display:flex;gap:5px;margin-top:5px;}
.sl-act-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r-full);}
.sl-act-pill.done{background:var(--green-light);color:var(--green-dark);}
.sl-act-pill.todo{background:var(--surface);color:var(--dim);}
.home-logo{font-size:17px;font-weight:800;}
.home-logo span{color:var(--primary);}
.home-badges{display:flex;gap:8px;}
.pill{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-full);font-size:13px;font-weight:600;}
.pill-xp{background:var(--yellow-light);color:#92400E;}
.home-scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.home-scroll::-webkit-scrollbar{display:none;}
.welcome{background:var(--primary);border-radius:var(--r);padding:20px;margin-bottom:20px;color:white;position:relative;overflow:hidden;}
.welcome::after{content:'📚';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:52px;opacity:.2;}
.welcome-title{font-size:20px;font-weight:800;margin-bottom:3px;}
.welcome-sub{font-size:13px;opacity:.8;margin-bottom:12px;}
.prog-row{display:flex;justify-content:space-between;font-size:12px;opacity:.85;margin-bottom:5px;}
.prog-track{height:6px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:white;border-radius:99px;transition:width .4s;}
.phase-divider{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:14px 0 8px;display:flex;align-items:center;gap:8px;}
.phase-divider::before,.phase-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.lesson-card{background:var(--white);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;border:2px solid transparent;-webkit-user-select:none;}
.lesson-card:active{transform:scale(.98);box-shadow:none;}
.lesson-card.done{border-color:var(--green);}
.lesson-card.locked{opacity:.45;cursor:default;}
.l-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.l-icon.blue{background:var(--primary-light);}
.l-icon.green{background:var(--green-light);}
.l-icon.purple{background:var(--purple-light);}
.l-icon.yellow{background:var(--yellow-light);}
.l-info{flex:1;min-width:0;}
.l-num{font-size:11px;font-weight:600;color:var(--muted);}
.l-title{font-size:14px;font-weight:700;margin:1px 0;}
.l-sub{font-size:12px;color:var(--muted);}
.l-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.l-badge.done{background:var(--green);color:white;font-size:13px;}
.l-badge.go{background:var(--primary-light);color:var(--primary);font-size:16px;}
.l-badge.lock{background:var(--surface);font-size:14px;}
.lesson-header{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-family:inherit;color:var(--text);}
.lh-info{flex:1;min-width:0;}
.lh-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lh-sub{font-size:11px;color:var(--muted);}
.lesson-scroll{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;}
.lesson-scroll::-webkit-scrollbar{display:none;}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 14px;border-radius:var(--r-full);border:2px solid var(--border);background:var(--white);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:inherit;}
.tab.active{background:var(--primary);border-color:var(--primary);color:white;}
.tab.done-tab{border-color:var(--green);color:var(--green-dark);}
.tab.done-tab.active{background:var(--green);border-color:var(--green);color:white;}
.card{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
.intro-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--primary);background:var(--primary-light);border-radius:var(--r-full);padding:3px 10px;margin-bottom:10px;}
.intro-h{font-size:20px;font-weight:800;margin-bottom:6px;line-height:1.3;}
.intro-desc{font-size:13.5px;color:var(--muted);line-height:1.75;}
.ref-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}
.ref-table th{text-align:left;padding:8px 10px;background:var(--surface);font-weight:700;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
.ref-table td{padding:8px 10px;border-top:1px solid var(--border);vertical-align:top;line-height:1.5;}
.ref-table tr:nth-child(even) td{background:var(--surface);}
.tense-name{font-weight:700;color:var(--primary-dark);}
.signal{font-size:11px;color:var(--dim);font-style:italic;}
.rule-box{background:var(--yellow-light);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:14px;border-left:4px solid var(--yellow);}
.rule-t{font-size:11px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.rule-b{font-size:13px;color:#78350F;line-height:1.7;}
.rule-b strong{color:#451A03;}
.qwrap{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
.qwrap-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.qwrap-title{font-size:14px;font-weight:700;}
.qright{display:flex;align-items:center;gap:6px;}
.qcounter{font-size:11px;font-weight:600;color:var(--muted);background:var(--surface);padding:3px 10px;border-radius:var(--r-full);}
.sbadge{font-size:10px;font-weight:600;color:var(--primary-dark);background:var(--primary-light);padding:2px 8px;border-radius:var(--r-full);}
.qprog{height:4px;background:var(--surface);border-radius:99px;margin-bottom:14px;overflow:hidden;}
.qprog-fill{height:4px;background:var(--primary);border-radius:99px;transition:width .3s;}
.q-text{font-size:16px;color:var(--text);font-weight:600;line-height:1.65;margin-bottom:12px;}
.hl{font-weight:800;color:var(--primary-dark);}
.fc-scene{perspective:900px;margin-bottom:16px;height:180px;}
.fc-card{width:100%;height:180px;transform-style:preserve-3d;transition:transform .45s;cursor:pointer;position:relative;display:grid;}
.fc-card.flipped{transform:rotateY(180deg);}
.fc-face{grid-area:1/1;border-radius:var(--r);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;}
.fc-front{background:var(--white);border:2px solid var(--border);box-shadow:var(--shadow-md);}
.fc-back{background:var(--primary-light);border:2px solid var(--primary);transform:rotateY(180deg);}
.fc-hint{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);margin-bottom:8px;}
.fc-word{font-size:20px;font-weight:800;margin-bottom:4px;line-height:1.3;}
.fc-tap{font-size:12px;color:var(--dim);}
.fc-def{font-size:13px;font-weight:700;color:var(--primary-dark);margin-bottom:6px;line-height:1.4;}
.fc-ex{font-size:12.5px;color:var(--muted);font-weight:600;font-style:italic;line-height:1.55;}
.fc-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.fc-arrow{width:44px;height:44px;border-radius:12px;border:2px solid var(--border);background:var(--white);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--text);}
.fc-arrow:active{background:var(--surface);}
.fc-arrow:disabled{opacity:.3;cursor:default;}
.fc-dots{display:flex;gap:5px;align-items:center;}
.fc-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .2s;}
.fc-dot.on{background:var(--primary);width:14px;border-radius:99px;}
.mcq-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.mcq-opt{padding:13px 15px;border-radius:var(--r-sm);border:2px solid var(--border);background:var(--white);cursor:pointer;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;transition:all .15s;-webkit-user-select:none;}
.mcq-opt:active{transform:scale(.98);}
.mcq-opt.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary-dark);}
.mcq-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
.mcq-opt.wrong{border-color:var(--red);background:var(--red-light);color:var(--red-dark);}
.opt-key{width:26px;height:26px;border-radius:7px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.mcq-opt.sel .opt-key{background:var(--primary);color:white;}
.mcq-opt.correct .opt-key{background:var(--green);color:white;}
.mcq-opt.wrong .opt-key{background:var(--red);color:white;}
.fill-sent{font-size:17px;font-weight:600;line-height:2.2;padding:14px;background:var(--surface);border-radius:var(--r-sm);margin-bottom:10px;}

.fill-inp.ok{border-color:var(--green);color:var(--green-dark);}
.fill-inp.bad{border-color:var(--red);color:var(--red-dark);}
.hint-tag{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);background:var(--surface);border-radius:var(--r-full);padding:3px 10px;margin-bottom:10px;}
.write-ta{width:100%;box-sizing:border-box;min-height:84px;resize:vertical;border:2px solid var(--border);border-radius:var(--r-sm);background:var(--white);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:500;color:var(--text);line-height:1.6;padding:11px 13px;outline:none;margin-bottom:12px;transition:border-color .15s;}

.write-cl li:before{content:"✓";position:absolute;left:0;top:0;color:var(--green);font-weight:800;}
.bank-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:14px;}
.bank-h{font-size:13px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.bank-sub{font-size:11.5px;color:var(--muted);margin-bottom:10px;}
.bank-item{border-left:3px solid var(--border);padding:7px 10px;margin-bottom:8px;background:var(--surface);border-radius:0 var(--r-sm) var(--r-sm) 0;position:relative;}
.bank-item.nailed{border-color:var(--green);}
.bank-item.review{border-color:var(--yellow);}

.bank-del{position:absolute;top:6px;right:8px;cursor:pointer;color:var(--muted);font-size:15px;line-height:1;border:none;background:none;padding:2px;}
.bank-del:hover{color:var(--red);}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.match-col{display:flex;flex-direction:column;gap:6px;}
.match-item{padding:11px 10px;border-radius:var(--r-sm);border:2px solid var(--border);background:var(--white);cursor:pointer;font-size:12px;font-weight:600;text-align:center;transition:all .15s;line-height:1.4;-webkit-user-select:none;}
.match-item:active{transform:scale(.97);}
.match-item.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary-dark);}
.match-item.ok{border-color:var(--green);background:var(--green-light);color:var(--green-dark);cursor:default;}

.tap-word{display:inline-block;padding:2px 5px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .12s;margin:2px;-webkit-user-select:none;}
.tap-word:active{transform:scale(.93);}
.tap-word.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary-dark);}
.tap-word.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
.tap-word.wrong{border-color:var(--red);background:var(--red-light);color:var(--red-dark);}
.ro-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}

.rtile.in{background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark);}
.rtile.ok{background:var(--green-light)!important;border-color:var(--green)!important;color:var(--green-dark)!important;}
.rtile.bad{background:var(--red-light)!important;border-color:var(--red)!important;color:var(--red-dark)!important;}

.btn:active{transform:scale(.97);}
.btn.primary{background:var(--primary);border-color:var(--primary);color:white;}
.btn.success{background:var(--green);border-color:var(--green);color:white;}
.btn.sm{padding:8px 14px;font-size:13px;}
.done-card{background:var(--white);border-radius:var(--r);padding:28px 20px;text-align:center;box-shadow:var(--shadow);}
.done-emoji{font-size:44px;margin-bottom:8px;}
.done-title{font-size:20px;font-weight:800;margin-bottom:6px;}
.done-score{display:inline-flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary-dark);font-size:14px;font-weight:700;padding:7px 16px;border-radius:var(--r-full);margin:10px 0 14px;}
.done-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
.unlock-banner{background:var(--green-light);border:2px solid var(--green);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:14px;}
.ub-emoji{font-size:36px;margin-bottom:8px;}
.ub-title{font-size:16px;font-weight:800;color:var(--green-dark);margin-bottom:4px;}
.ub-sub{font-size:13px;color:var(--green-dark);opacity:.8;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:white;padding:11px 20px;border-radius:var(--r-full);font-size:13px;font-weight:600;z-index:9999;transition:transform .3s ease;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-md);}
.toast.show{transform:translateX(-50%) translateY(0);}

[data-theme="dark"] .rule-b{color:#FDE68A;}

.theme-btn{width:34px;height:34px;border-radius:10px;background:var(--surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:background .2s;}

.modal-inp{width:100%;padding:12px 14px;border-radius:var(--r-sm);border:2px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;outline:none;color:var(--text);background:var(--bg);margin-bottom:6px;}
.modal-inp:focus{border-color:var(--primary);}
.modal-hint{font-size:11px;color:var(--dim);margin-bottom:18px;line-height:1.6;}
</style>

<script>
const SB=supabase.createClient('https://wcfoymiqfpzoxctexdub.supabase.co','sb_publishable_vyCD7qOBTheSMhM6fgXeLw_me3ViUg6');
const SK="em_full_v1",PK="em_passphrase";
let ST={};
let _ppRes=null;
const LEVELS=[
  {name:"Beginner",emoji:"📖",min:0,color:"#9CA3AF"},
  {name:"Learner",emoji:"✏️",min:200,color:"#4F6EF7"},
  {name:"Practitioner",emoji:"🎯",min:500,color:"#8B5CF6"},
  {name:"Educator",emoji:"🏛️",min:1000,color:"#F59E0B"},
  {name:"Master",emoji:"🎓",min:2000,color:"#22C55E"},
];
function getLevel(xp){for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].min)return{...LEVELS[i],idx:i};}return{...LEVELS[0],idx:0};}
function lessonMastery(lid){const m=ST.mastery&&ST.mastery[lid];if(!m)return 0;const acts=["mcq","fill","match","tap","err"];const scores=acts.filter(a=>m[a]!==undefined).map(a=>m[a]);if(!scores.length)return 0;return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);}
function masteryColor(p){return p>=80?"var(--green)":p>=50?"var(--primary)":"var(--yellow)";}
function loadLocalST(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return{xp:0,completed:[],actDone:{},retryCount:{},mastery:{}};}
function saveLocal(){try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}}
function saveST(){saveLocal();pushCloud();}
async function pushCloud(){const pp=localStorage.getItem(PK);if(!pp)return;try{await SB.from('progress').upsert({user_id:pp,data:ST,updated_at:new Date().toISOString()});}catch(e){}}
function showPPModal(){return new Promise(r=>{_ppRes=r;document.getElementById('pp-modal').style.display='flex';setTimeout(()=>document.getElementById('pp-inp').focus(),80);});}
function confirmPP(){const v=document.getElementById('pp-inp').value.trim();if(!v){toast('Enter a passphrase first');return;}document.getElementById('pp-modal').style.display='none';if(_ppRes){_ppRes(v);_ppRes=null;}}
async function initApp(){
  let pp=localStorage.getItem(PK);
  if(!pp){pp=await showPPModal();localStorage.setItem(PK,pp);}
  try{
    const{data}=await SB.from('progress').select('data').eq('user_id',pp).maybeSingle();
    if(data&&data.data){ST=data.data;try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}}
    else{ST=loadLocalST();pushCloud();}
  }catch(e){ST=loadLocalST();}
  if(!ST.mastery)ST.mastery={};
  ensureDailyFields();
  startStudyTimer();
  buildHome();
  buildSidebar();
}
function addXP(n){ensureDailyFields();const _t=todayStr();if(ST.lastStudyDay!==_t){if(ST.lastStudyDay&&dayDiff(ST.lastStudyDay,_t)===1)ST.streak=(ST.streak||0)+1;else ST.streak=1;ST.lastStudyDay=_t;if(ST.streak>(ST.bestStreak||0))ST.bestStreak=ST.streak;}ST.xp+=n;ST.dailyXP.xp+=n;saveST();const el=document.getElementById("h-xp");if(el)el.textContent=ST.xp;buildSidebar();}
function markActDone(lid,act,score,total){if(!ST.actDone[lid])ST.actDone[lid]={};ST.actDone[lid][act]=true;if(score!==undefined&&total!==undefined){if(!ST.mastery)ST.mastery={};if(!ST.mastery[lid])ST.mastery[lid]={};ST.mastery[lid][act]=Math.round((score/total)*100);}saveST();buildTabs(lid);checkComplete(lid);buildSidebar();}
const MAIN_LESSONS=new Set(["pos","articles","tenses","agreement","phrases","clauses","sentencetypes","punctuation","mistakes","register","clarity","cohesion","explaining","erroranalysis","academic"]);
function checkComplete(lid){if(!MAIN_LESSONS.has(lid))return;const acts=["mcq","fill","match","tap","err"];if(acts.every(a=>ST.actDone[lid]&&ST.actDone[lid][a])&&!ST.completed.includes(lid)){ST.completed.push(lid);ST.xp+=50;ensureDailyFields();ST.dailyXP.xp+=50;saveST();toast("🎉 Lesson complete! +50 XP");buildHome();}}
function lessonCompletion(lid){const acts=["mcq","fill","match","tap","err"];const done=acts.filter(a=>ST.actDone[lid]&&ST.actDone[lid][a]).length;return{done,total:acts.length,pct:Math.round((done/acts.length)*100)};}
function subCompletion(slid){const acts=["mcq","fill"];const done=acts.filter(a=>ST.actDone[slid]&&ST.actDone[slid][a]).length;return{done,total:acts.length,pct:Math.round((done/acts.length)*100)};}
function actScore(lid,act){return ST.mastery&&ST.mastery[lid]&&ST.mastery[lid][act]!==undefined?ST.mastery[lid][act]:null;}
function getRC(lid,act){if(!ST.retryCount[lid])ST.retryCount[lid]={};return ST.retryCount[lid][act]||0;}
function incRC(lid,act){if(!ST.retryCount[lid])ST.retryCount[lid]={};ST.retryCount[lid][act]=(ST.retryCount[lid][act]||0)+1;saveST();}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function pickSet(arr,n,att){const s=(att*n)%arr.length;const res=[];for(let i=0;i<n;i++)res.push(arr[(s+i)%arr.length]);return res;}

// ── M1: consistency layer (streak, daily goal, countdown, study timer) ──
const TARGET_DATE="2026-08-06";
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dayDiff(a,b){return Math.round((Date.parse(b+"T00:00:00")-Date.parse(a+"T00:00:00"))/86400000);}
function daysToTarget(){return dayDiff(todayStr(),TARGET_DATE);}
function ensureDailyFields(){const t=todayStr();if(ST.streak==null)ST.streak=0;if(ST.bestStreak==null)ST.bestStreak=0;if(ST.goalXP==null)ST.goalXP=50;if(!ST.dailyXP||ST.dailyXP.date!==t)ST.dailyXP={date:t,xp:0};if(!ST.studySeconds)ST.studySeconds={total:0,today:0,day:t};if(ST.studySeconds.day!==t){ST.studySeconds.day=t;ST.studySeconds.today=0;}if(ST.lastStudyDay&&dayDiff(ST.lastStudyDay,t)>1)ST.streak=0;}
function fmtStudyTime(s){s=Math.floor(s||0);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h>0)return h+"h "+m+"m";if(m>0)return m+"m";return s+"s";}
// Keyword highlighting: bold + blue for grammar terms and ALL-CAPS focus words
const HL_TERMS=new Set("noun nouns pronoun pronouns verb verbs adjective adjectives adverb adverbs preposition prepositions conjunction conjunctions interjection interjections article articles determiner determiners subject subjects object objects predicate predicates clause clauses phrase phrases tense tenses gerund gerunds infinitive infinitives participle participles participial appositive appositives auxiliary auxiliaries modal modals antecedent antecedents definite indefinite".split(" "));
function hl(t){if(t==null)return t;return String(t).replace(/[A-Za-z]+/g,function(w){return (/^[A-Z]{2,}$/.test(w)||HL_TERMS.has(w.toLowerCase()))?'<span class="hl">'+w+'</span>':w;});}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
let _studyDirty=false,_studyTick=null;
function studyTick(){const scr=document.querySelector(".screen.active");if(!scr||document.visibilityState!=="visible")return;if(scr.id!=="scr-lesson"&&scr.id!=="scr-sub")return;ensureDailyFields();ST.studySeconds.today++;ST.studySeconds.total++;_studyDirty=true;if(ST.studySeconds.total%20===0)saveLocal();}
function flushStudy(){if(_studyDirty){saveST();_studyDirty=false;}}
function startStudyTimer(){if(!_studyTick)_studyTick=setInterval(studyTick,1000);document.addEventListener("visibilitychange",function(){if(document.visibilityState==="hidden")flushStudy();});}

const PHASES=[
  {label:"Phase 1 — Building Blocks",lessons:[
    {id:"pos",num:1,title:"Parts of Speech",sub:"The 8 categories every word belongs to",icon:"🔤",color:"blue",unlocked:true},
    {id:"articles",num:2,title:"Articles & Determiners",sub:"a, an, the — and when to skip them",icon:"📌",color:"green",unlocked:true},
    {id:"tenses",num:3,title:"Verb Tenses & Aspect",sub:"12 tenses mastered clearly",icon:"⏰",color:"purple",unlocked:true},
    {id:"agreement",num:4,title:"Subject-Verb Agreement",sub:"Matching subjects and verbs",icon:"🔗",color:"yellow",unlocked:true},
  ]},
  {label:"Phase 2 — Sentence Structure",lessons:[
    {id:"phrases",num:5,title:"Phrases",sub:"Noun, verb, adjective, adverb...",icon:"🧩",color:"blue",unlocked:true},
    {id:"clauses",num:6,title:"Clauses",sub:"Independent, dependent, relative",icon:"🔀",color:"green",unlocked:true},
    {id:"sentencetypes",num:7,title:"Sentence Types",sub:"Simple, compound, complex",icon:"📝",color:"purple",unlocked:true},
    {id:"punctuation",num:8,title:"Punctuation",sub:"How punctuation shapes meaning",icon:"✍️",color:"yellow",unlocked:true},
  ]},
  {label:"Phase 3 — Precision & Style",lessons:[
    {id:"mistakes",num:9,title:"Common Mistakes",sub:"The errors that trip everyone up",icon:"🚨",color:"blue",unlocked:false},
    {id:"register",num:10,title:"Word Choice & Register",sub:"Formal vs informal English",icon:"🎭",color:"green",unlocked:false},
    {id:"clarity",num:11,title:"Conciseness & Clarity",sub:"Say more with less",icon:"🎯",color:"purple",unlocked:false},
    {id:"cohesion",num:12,title:"Coherence & Cohesion",sub:"Writing that flows naturally",icon:"🌊",color:"yellow",unlocked:false},
  ]},
  {label:"Phase 4 — The Teacher's Edge",lessons:[
    {id:"explaining",num:13,title:"Explaining Grammar Simply",sub:"The art of clear instruction",icon:"💡",color:"blue",unlocked:false},
    {id:"erroranalysis",num:14,title:"Error Analysis",sub:"Identifying & correcting mistakes",icon:"🔍",color:"green",unlocked:false},
    {id:"academic",num:15,title:"Academic vs Everyday English",sub:"Knowing which register to use",icon:"🎓",color:"purple",unlocked:false},
  ]},
];

const LD={

    intro:{tag:"Lesson 2",h:"Articles & Determiners",desc:"Articles are small but powerful. Getting them right makes your English sound natural and professional. The key rule: it's about SOUND, not spelling."},

    fc:[{f:'"the"',h:"Article",b:"Definite article — both speaker and listener know which specific noun is meant",e:'"Pass me the book." (we both know which book)'},{f:'"a"',h:"Article",b:'Indefinite — used before consonant sounds for non-specific nouns',e:'"I need a pen." / "She is a teacher."'},{f:'"an"',h:"Article",b:'Indefinite — used before VOWEL SOUNDS (not just vowel letters)',e:'"an apple, an hour, an MBA, an honest man"'},{f:"Zero Article",h:"Article",b:"No article — proper nouns, general plurals, uncountable nouns used generally",e:'"Dogs are loyal." / "Kuwait is hot."'},{f:'"a university"',h:"Tricky Case",b:'Starts with U but sounds like "yoo" (consonant sound) → use "a"',e:'"He is a university student." ✓'},{f:'"an hour"',h:"Tricky Case",b:'Starts with H but the H is silent → vowel sound → use "an"',e:'"It took an hour." ✓'},{f:'"the piano"',h:"Special Rule",b:'Musical instruments always use "the"',e:'"She plays the piano." / "He learned the guitar."'},{f:"Zero + proper noun",h:"Special Rule",b:"Country names, people's names, city names take no article",e:'"Kuwait is hot." Exception: The UAE, The USA'}],

  tenses:{
    title:"Verb Tenses & Aspect",sub:"Lesson 3 — Phase 1",
    intro:{tag:"Lesson 3",h:"Verb Tenses & Aspect",desc:"English has 12 tenses formed by combining time (past, present, future) with aspect (simple, continuous, perfect, perfect continuous). Master them and you'll teach with confidence."},
    rule:{t:"The big pattern",b:'<strong>Simple</strong> = the fact. <strong>Perfect</strong> = connection to another time. <strong>Continuous</strong> = action in progress.<br><br>Key signals: <em>yesterday/last year</em> → Past Simple | <em>since/for/already/yet</em> → Present Perfect | <em>when + interruption</em> → Past Continuous | <em>by + future time</em> → Future Perfect'},
    defs:[{icon:"1️⃣",t:"Present Simple",d:"Habits, facts, general truths",e:"She teaches every day."},{icon:"2️⃣",t:"Present Continuous",d:"Happening now or temporary",e:"She is teaching right now."},{icon:"3️⃣",t:"Present Perfect",d:"Past action, present relevance",e:"She has taught here for years."},{icon:"4️⃣",t:"Past Simple",d:"Completed action, specific time",e:"She taught in 2018."},{icon:"5️⃣",t:"Past Continuous",d:"In progress when interrupted",e:"She was teaching when I arrived."},{icon:"6️⃣",t:"Past Perfect",d:"Before another past action",e:"She had taught before I was born."},{icon:"7️⃣",t:"Future (will)",d:"Predictions, promises, instant decisions",e:"She will teach tomorrow."},{icon:"8️⃣",t:"Going to",d:"Plans decided, evidence-based prediction",e:"She is going to teach tomorrow."}],
    fc:[{f:"Present Simple",h:"Tense",b:"Habits, facts, and general truths.",e:"She teaches English every day. / Water boils at 100°C."},{f:"Present Continuous",h:"Tense",b:"An action happening right now or a temporary situation.",e:"She is teaching a class right now. / I am studying this week."},{f:"Present Perfect",h:"Tense",b:"A past action connected to the present — exact time doesn't matter.",e:"She has taught at three universities. / I have lived here for two years."},{f:"Present Perfect Continuous",h:"Tense",b:"Emphasises how long an action has been ongoing — still happening or just stopped.",e:"She has been teaching for five hours. / I have been studying since morning."},{f:"Past Simple",h:"Tense",b:"A completed action at a specific time in the past.",e:"I studied in Pennsylvania for six years. / She explained the rule clearly."},{f:"Past Continuous",h:"Tense",b:"An action in progress when another action interrupted it.",e:"I was studying when my phone rang. / She was teaching when the director walked in."},{f:"Past Perfect",h:"Tense",b:"An action that happened before another past action — the past of the past.",e:"When I arrived, the students had already started. / She had taught for ten years before she got her PhD."},{f:"Past Perfect Continuous",h:"Tense",b:"Emphasises how long an action had been going on before another past event.",e:"She had been teaching for three hours when the fire alarm went off."},{f:"Future Simple (will)",h:"Tense",b:"Predictions, promises, and decisions made at the moment of speaking.",e:"I will teach at Kuwait University in the fall. / I'll help you with that."},{f:"Going to",h:"Tense",b:"Plans already decided, or predictions based on visible evidence.",e:"I am going to prepare my syllabus this weekend. / Watch out — you are going to fall!"},{f:"Future Continuous",h:"Tense",b:"An action that will be in progress at a specific future time.",e:"This time next year, I will be teaching my first class."},{f:"Future Perfect",h:"Tense",b:"An action that will be completed before a specific future time.",e:"By June, she will have taught 200 students."}],
    mcqBank:[{q:'Which tense is used in: "She has been teaching for five hours"?',opts:["Present Perfect","Past Continuous","Present Perfect Continuous","Present Continuous"],ans:2,exp:"Present Perfect Continuous — emphasises how long the action has been going on. Key signal: 'for + duration' with an ongoing activity."},{q:'"I was reading when the phone rang." What tense is "was reading"?',opts:["Past Simple","Past Perfect","Past Continuous","Present Continuous"],ans:2,exp:"Past Continuous — it describes the background action in progress when another action (rang) interrupted it."},{q:'Choose the correct tense: "By the time she arrived, the class ___ already ___."',opts:["has / started","had / started","was / starting","will / start"],ans:1,exp:"Past Perfect (had started) — the class starting happened BEFORE she arrived. Past Perfect = the past of the past."},{q:'Which sentence uses the correct tense?',opts:["I live here since 2020.","I am living here since 2020.","I have lived here since 2020.","I lived here since 2020."],ans:2,exp:'"Since" signals Present Perfect. The action started in the past and continues now — "I have lived here since 2020." ✓'},{q:'"Watch out — you ___ fall!" Which form is correct?',opts:["will","are going to","have","were going to"],ans:1,exp:'"Are going to" — there is visible evidence right now (the person is losing balance). Going to = prediction based on evidence.'},{q:'What is the difference between "I lived in Kuwait" and "I have lived in Kuwait"?',opts:["No difference","First is wrong","First = finished fact; second = connected to present","Second = further in the past"],ans:2,exp:"Past Simple (lived) = closed, finished. Present Perfect (have lived) = the experience is still relevant to the present moment."},{q:'Choose the correct sentence:',opts:["She teaches here since 2018.","She has been teaching here since 2018.","She was teaching here since 2018.","She had taught here since 2018."],ans:1,exp:"Present Perfect Continuous + since — the action started in 2018 and is still ongoing."},{q:'"This time tomorrow, I ___ my first lecture." Which tense?',opts:["will give","am giving","will be giving","have given"],ans:2,exp:"Future Continuous — describes an action in progress at a specific future time ('this time tomorrow')."},{q:'Which signal word goes with Present Perfect?',opts:["yesterday","last year","already","in 2019"],ans:2,exp:'"Already" is a Present Perfect signal word. Yesterday, last year, and in 2019 go with Past Simple.'},{q:'"By June, she ___ 200 students." Which tense completes this correctly?',opts:["teaches","will teach","will have taught","is teaching"],ans:2,exp:"Future Perfect — the action will be completed BEFORE a specific future point (June). Signal: 'by + future time.'"},{q:'What tense is: "I am going to prepare my syllabus this weekend"?',opts:["Future Simple","Present Continuous","Going to future","Future Perfect"],ans:2,exp:"Going to future — the plan was already decided before the moment of speaking."},{q:'"She had been waiting for two hours when he finally arrived." What tense is "had been waiting"?',opts:["Past Perfect","Past Continuous","Present Perfect Continuous","Past Perfect Continuous"],ans:3,exp:"Past Perfect Continuous — emphasises the duration of an action ongoing before another past event (he arrived)."},

    title:"Subject-Verb Agreement",sub:"Lesson 4 — Phase 1",
    intro:{tag:"Lesson 4",h:"Subject-Verb Agreement",desc:"One of the most common sources of errors in academic writing. Master these rules and you will both write correctly and spot errors instantly in your students' work."},
    rule:{t:"Core rules to master",b:'<strong>Singular subject → verb + s</strong> (He speaks). <strong>Plural subject → no + s</strong> (They speak).<br><br>Watchlist: <em>everyone / each / someone</em> = singular | <em>both / many</em> = plural | collective nouns (team, committee) = singular (AmE) | intervening phrases never change the subject.'},
    defs:[
      {icon:"📌",t:"Basic Rule",d:"Singular subject → verb +s; plural → no +s",e:"The student speaks. / The students speak."},
      {icon:"➕",t:"Compound with 'and'",d:"Two subjects joined by 'and' → plural verb",e:"Mohammad and his colleague teach here."},
      {icon:"⚖️",t:"'or / nor' Rule",d:"Verb agrees with the NEAREST subject",e:"Neither the students nor the teacher is late."},
      {icon:"👤",t:"Indefinite Pronouns",d:"everyone, each, someone, nobody → singular",e:"Everyone in the class is ready."},
      {icon:"👥",t:"Collective Nouns",d:"team, committee, class → singular (AmE)",e:"The committee has made its decision."},
      {icon:"🔢",t:"Disciplines ending -s",d:"Mathematics, physics, economics → singular",e:"Mathematics is my favourite subject."},
    ],

      {f:"'or / nor' Rule",h:"Agreement",b:"With 'or' or 'nor,' the verb agrees with the subject NEAREST to it.",e:"Neither the students nor the teacher is late."},
      {f:"Indefinite Pronouns",h:"Agreement",b:"Everyone, each, someone, anyone, nobody are always singular.",e:"Everyone in the room knows the answer."},

  phrases:{
    title:"Phrases",sub:"Lesson 5 — Phase 2",
    intro:{tag:"Lesson 5",h:"Phrases — The Building Units of Sentences",desc:"A phrase is a group of words that works together as a single unit but has no subject–verb pair of its own. Phrases are the bricks; clauses and sentences are the walls. Once you can spot the core phrase types, sentence structure stops being a mystery — for you and for your students."},
    rule:{t:"⚠️ Phrase vs. Clause — the one test",b:'A <strong>phrase</strong> has <strong>no subject + verb working together</strong>; a <strong>clause</strong> does.<br>Phrase: <em>in the morning</em>, <em>the dedicated teacher</em>, <em>has been grading</em><br>Clause: <em>because she teaches</em> (subject + verb)<br>Name a phrase by its <strong>head word</strong>: a noun phrase is built around a noun, a verb phrase around a verb, and so on.'},
    defs:[{icon:"🏷️",t:"Noun phrase",d:"A noun plus its modifiers, acting as one noun",e:"the talented young teacher"},{icon:"⚡",t:"Verb phrase",d:"A main verb plus its auxiliaries",e:"has been teaching"},{icon:"🎨",t:"Adjective phrase",d:"An adjective plus its modifiers, describing a noun",e:"extremely proud of her students"},{icon:"🎯",t:"Adverb phrase",d:"An adverb plus its modifiers",e:"far more carefully"},{icon:"🔗",t:"Prepositional phrase",d:"A preposition + its object; acts as adjective or adverb",e:"in the lecture hall"},{icon:"➡️",t:"Infinitive phrase",d:"to + base verb (+ objects)",e:"to master English grammar"},{icon:"🔄",t:"Gerund phrase",d:"An -ing verb acting as a noun",e:"teaching at Kuwait University"},{icon:"🧩",t:"Appositive phrase",d:"A noun phrase that renames the noun beside it",e:"Mohammad, a grammar teacher,"}],
    fc:[{f:"Noun phrase",h:"Phrase type",b:"A noun and all the words that modify it, working together as a single noun.",e:"the brilliant young scholar from Kuwait"},{f:"Verb phrase",h:"Phrase type",b:"The main verb together with its helping (auxiliary) verbs.",e:"will have been teaching — four words, one verb idea"},{f:"Adjective phrase",h:"Phrase type",b:"A group of words built around an adjective that describes a noun.",e:"proud of her students"},{f:"Adverb phrase",h:"Phrase type",b:"A group of words built around an adverb — tells how, when, where, or to what degree.",e:"very clearly / far too quickly"},{f:"Prepositional phrase",h:"Phrase type",b:"A preposition + a noun (its object). It works as an adjective or an adverb.",e:"the book on the desk / She left at noon"},{f:"Infinitive phrase",h:"Phrase type",b:"to + a base verb, plus any objects or modifiers. Can act as noun, adjective, or adverb.",e:"To teach well takes patience."},{f:"Gerund phrase",h:"Phrase type",b:"An -ing verb form (and its objects) used as a noun.",e:"Teaching grammar is my passion."},{f:"Head word",h:"Key idea",b:"The single most important word a phrase is built around; it names the phrase type.",e:'In "a very long lecture," the head is the noun "lecture."'}],
    mcqBank:[{q:'In "The dedicated teacher graded every paper," which words form the noun-phrase subject?',opts:["graded every paper","The dedicated teacher","every paper","teacher graded"],ans:1,exp:'"The dedicated teacher" is the noun phrase subject — a noun ("teacher") with its modifiers.'},{q:'What is the complete verb phrase in "She has been teaching since 2020"?',opts:["teaching","has been","has been teaching","been teaching since"],ans:2,exp:'"Has been teaching" is the full verb phrase: auxiliaries "has been" + main verb "teaching."'},{q:"Which group of words is a prepositional phrase?",opts:["the young student","quickly answered","in the classroom","has finished"],ans:2,exp:'"In the classroom" = preposition ("in") + its object ("the classroom").'},{q:"Which of these is a PHRASE, not a clause?",opts:["because she was tired","after the bell rang","on a cold morning","when the class ended"],ans:2,exp:'"On a cold morning" has no subject–verb pair, so it is a phrase. The others contain a subject and a verb.'},{q:'In "The student with the red notebook is mine," the phrase "with the red notebook" works as a(n):',opts:["adverb — modifies a verb","adjective — modifies a noun","noun — it is the subject","verb — it shows action"],ans:1,exp:'It tells us WHICH student, modifying the noun "student," so it acts as an adjective.'},{q:'In "She arrived before the lecture," the phrase "before the lecture" works as a(n):',opts:["adjective","noun","adverb","conjunction"],ans:2,exp:'It tells us WHEN she arrived, modifying the verb "arrived," so it acts as an adverb.'},{q:'In "Teaching grammar well requires patience," what is "Teaching grammar well"?',opts:["a verb phrase","a gerund phrase acting as the subject","a prepositional phrase","an adjective phrase"],ans:1,exp:'The -ing form "Teaching" heads a gerund phrase that works as a noun — here, the subject.'},{q:'Identify the infinitive phrase: "Mohammad loves to explain difficult rules."',opts:["Mohammad loves","loves to explain","to explain difficult rules","difficult rules"],ans:2,exp:'"To explain difficult rules" = to + base verb "explain" + object — an infinitive phrase.'},{q:'In "The lecture was surprisingly easy to follow," the adjective phrase is:',opts:["The lecture","was surprisingly","surprisingly easy to follow","to follow"],ans:2,exp:'"Surprisingly easy to follow" is built around the adjective "easy" and describes "the lecture."'},{q:'Which is the adverb phrase in "He answered the question very confidently"?',opts:["the question","He answered","very confidently","answered the question"],ans:2,exp:'"Very confidently" is built around the adverb "confidently" and tells HOW he answered.'},{q:'What is the head word of the noun phrase "a remarkably gifted linguistics student"?',opts:["a","remarkably","gifted","student"],ans:3,exp:'The head word is the noun "student"; everything else modifies it.'},{q:'In "Dr. Ahmed, our department head, approved the syllabus," what is "our department head"?',opts:["a prepositional phrase","an appositive phrase renaming Dr. Ahmed","the subject of the sentence","a verb phrase"],ans:1,exp:'"Our department head" is an appositive phrase — a noun phrase that renames the noun beside it.'},{q:'In "She admires her hardworking colleagues," which noun phrase is the object?',opts:["She admires","her hardworking colleagues","admires her","hardworking"],ans:1,exp:'"Her hardworking colleagues" is the noun phrase functioning as the direct object.'},{q:'How many prepositional phrases are in "The notes on the desk in my office are old"?',opts:["one","two","three","none"],ans:1,exp:'Two: "on the desk" and "in my office," each a preposition + object.'}],
    fillBank:[{b:"She left her notes",a:"the lecture hall.",h:"preposition",ac:["in","on","at","near","inside","by"],ex:'A preposition starts the phrase, e.g. "in the lecture hall."'},{b:"The students",a:"been working hard all term.",h:"auxiliary verb",ac:["have"],ex:'"Have been working" is the verb phrase; "have" is the missing auxiliary.'},{b:"Mohammad loves",a:"explain tricky rules.",h:"infinitive marker",ac:["to"],ex:'"To explain tricky rules" is an infinitive phrase — it needs the marker "to."'},{b:"The book",a:"the top shelf belongs to me.",h:"preposition",ac:["on","upon"],ex:'"On the top shelf" is a prepositional phrase telling which book.'},{b:"She is very proud",a:"her students.",h:"preposition",ac:["of"],ex:'"Proud of her students" is an adjective phrase; the preposition is "of."'},{b:"",a:"grammar well takes years of practice.",h:"gerund (-ing verb)",ac:["teaching","learning","explaining","mastering","studying"],ex:'A gerund phrase like "Teaching grammar well" acts as the subject.'},{b:"He will",a:"finished the report by noon.",h:"auxiliary (perfect)",ac:["have"],ex:'"Will have finished" is a future-perfect verb phrase; the auxiliary is "have."'},{b:"The lecture",a:"applied linguistics was excellent.",h:"preposition",ac:["on","about"],ex:'"On applied linguistics" is a prepositional phrase telling which lecture.'},{b:"They walked",a:"the long corridor to the hall.",h:"preposition",ac:["down","along","through","up"],ex:'"Down the long corridor" is a prepositional phrase showing where they walked.'},{b:"A noun together with its modifiers is called a",a:"phrase.",h:"phrase type",ac:["noun"],ex:'"The talented teacher" is a noun phrase — a noun plus its modifiers.'},{b:"The auxiliaries plus the main verb form the",a:"phrase.",h:"phrase type",ac:["verb"],ex:'"Has been teaching" is a verb phrase — auxiliaries + main verb.'},{b:"She spoke",a:"more slowly so everyone could follow.",h:"degree adverb",ac:["far","much","even","a lot"],ex:'"Far more slowly" is an adverb phrase modifying "spoke."'}],

  clauses:{
    title:"Clauses",sub:"Lesson 6 — Phase 2",
    intro:{tag:"Lesson 6",h:"Clauses — Units With a Subject and a Verb",desc:"A clause is a group of words containing a subject and a verb. That single feature — a subject doing a verb — is what separates a clause from a phrase. Some clauses can stand alone as sentences (independent); others cannot (dependent). Master the difference and every sentence type falls into place."},
    rule:{t:"⚠️ The one test: can it stand alone?",b:'Every clause has a <strong>subject + verb</strong>. If it expresses a complete thought and can stand alone, it is <strong>independent</strong>: <em>she teaches grammar</em>. If a subordinating word leaves it hanging, it is <strong>dependent</strong>: <em>because she teaches grammar</em>. A dependent clause must attach to an independent one.'},
    defs:[{icon:"🧱",t:"Independent clause",d:"Subject + verb; stands alone as a sentence",e:"Mohammad teaches grammar."},{icon:"🔗",t:"Dependent clause",d:"Subject + verb but cannot stand alone",e:"because she teaches grammar"},{icon:"➕",t:"Subordinating conjunction",d:"Begins a dependent clause",e:"because, although, when, if, since"},{icon:"🎨",t:"Relative clause",d:"An adjective clause that describes a noun",e:"the teacher who inspires us"},{icon:"🔄",t:"Relative pronoun",d:"Introduces a relative clause",e:"who, whom, whose, which, that"},{icon:"🏷️",t:"Noun clause",d:"A clause acting as a single noun",e:"What she said matters."},{icon:"🎯",t:"Adverbial clause",d:"A dependent clause acting as an adverb",e:"when the bell rang"},{icon:"⚖️",t:"Restrictive vs not",d:"Essential = no commas; extra info = commas",e:"The man who called / My boss, who called,"}],
    fc:[{f:"Independent clause",h:"Clause type",b:"Has a subject and verb and expresses a complete thought; it can stand alone.",e:"Mohammad teaches grammar."},{f:"Dependent clause",h:"Clause type",b:"Has a subject and verb but cannot stand alone; it needs a main clause.",e:"because she loves teaching"},{f:"Subordinating conjunction",h:"Connector",b:"Begins a dependent clause and links it to the main clause.",e:"because, although, when, if, since, while"},{f:"Relative clause",h:"Clause type",b:"An adjective clause that describes a noun; it begins with a relative pronoun.",e:"the teacher who inspires us"},{f:"Relative pronoun",h:"Connector",b:"Introduces a relative clause and points back to a noun.",e:"who, whom, whose, which, that"},{f:"Noun clause",h:"Clause type",b:"A whole clause acting as one noun — subject, object, or complement.",e:"What she said matters."},{f:"Adverbial clause",h:"Clause type",b:"A dependent clause acting as an adverb — why, when, where, how, or under what condition.",e:"when the bell rang"},{f:"Restrictive vs non-restrictive",h:"Key idea",b:"Essential clauses take no commas; extra-information clauses take commas.",e:"The man who called / My boss, who called,"}],
    mcqBank:[{q:"Which group of words is an INDEPENDENT clause?",opts:["because she was late","when the class started","She graded the essays.","after the lecture ended"],ans:2,exp:'"She graded the essays" has a subject and verb and stands alone — independent. The others begin with subordinators.'},{q:"What makes a clause DEPENDENT?",opts:["It has no verb","It begins with a subordinating word and cannot stand alone","It is very short","It has no subject"],ans:1,exp:'A dependent clause has a subject and verb but a subordinating word leaves the thought incomplete.'},{q:'In "Although it rained, we walked to class," which is the dependent clause?',opts:["we walked to class","Although it rained","to class","it rained, we walked"],ans:1,exp:'"Although it rained" cannot stand alone, so it is the dependent clause.'},{q:'Identify the relative clause: "The student who studied hardest passed."',opts:["The student","who studied hardest","passed","studied hardest passed"],ans:1,exp:'"Who studied hardest" describes the noun "student" — a relative (adjective) clause.'},{q:'In "What she taught changed my life," the clause "What she taught" functions as a:',opts:["adverb","adjective","noun (subject)","verb"],ans:2,exp:'"What she taught" works as a noun — it is the subject of the sentence.'},{q:"Which word is a subordinating conjunction?",opts:["and","but","because","or"],ans:2,exp:'"Because" begins a dependent clause; the others are coordinating conjunctions.'},{q:'Choose the relative pronoun: "The book that I borrowed is overdue."',opts:["book","that","borrowed","overdue"],ans:1,exp:'"That" introduces the relative clause "that I borrowed."'},{q:'"When the bell rang" is what kind of clause?',opts:["independent clause","adverbial (dependent) clause","noun clause","there is no clause"],ans:1,exp:'It has a subject and verb but cannot stand alone, and it tells WHEN — an adverbial dependent clause.'},{q:'How many independent clauses are in "She teaches and he writes"?',opts:["one","two","three","none"],ans:1,exp:'"She teaches" and "he writes" are two independent clauses joined by "and."'},{q:'In "The teacher whose class I enjoy is retiring," the relative clause modifies:',opts:["class","I","the teacher","retiring"],ans:2,exp:'"Whose class I enjoy" describes "the teacher."'},{q:"A dependent clause that answers WHY, WHEN, or HOW acts as a(n):",opts:["adjective","noun","adverb","preposition"],ans:2,exp:'A clause answering why/when/how modifies the verb — it is adverbial.'},{q:"Which sentence contains a NOUN clause?",opts:["She left after the meeting.","I know that you tried.","The man who called is here.","Read the chapter quickly."],ans:1,exp:'"That you tried" is a noun clause working as the object of "know."'},{q:'In "Whoever finishes first wins," the noun clause is the:',opts:["object","subject","modifier","verb"],ans:1,exp:'"Whoever finishes first" is a noun clause functioning as the subject.'},{q:"A restrictive relative clause (essential information) is punctuated with:",opts:["commas around it","no commas","a semicolon","a dash"],ans:1,exp:'Essential (restrictive) clauses take no commas: "The student who studied hardest passed."'}],

  sentencetypes:{
    title:"Sentence Types",sub:"Lesson 7 — Phase 2",
    intro:{tag:"Lesson 7",h:"Sentence Types — Simple to Compound-Complex",desc:"Once you can count clauses, you can name any sentence. The four structural types are built from independent and dependent clauses; the four functional types are defined by purpose. Varying your sentence types is what makes writing rhythmic and clear — a skill worth teaching explicitly."},
    rule:{t:"⚠️ Count the clauses",b:'<strong>Simple</strong> = one independent clause. <strong>Compound</strong> = two or more independent clauses (joined by a comma + FANBOYS or a semicolon). <strong>Complex</strong> = one independent + at least one dependent. <strong>Compound-complex</strong> = two or more independent + at least one dependent.'},
    defs:[{icon:"1️⃣",t:"Simple sentence",d:"One independent clause",e:"Mohammad teaches grammar."},{icon:"➕",t:"Compound sentence",d:"Two+ independent clauses joined",e:"She teaches, and he writes."},{icon:"🔀",t:"Complex sentence",d:"One independent + one+ dependent",e:"Because it rained, we stayed."},{icon:"🧩",t:"Compound-complex",d:"Two+ independent + one+ dependent",e:"When it rang, she left and he stayed."},{icon:"🔗",t:"Coordinating conj.",d:"Joins equals — FANBOYS",e:"for, and, nor, but, or, yet, so"},{icon:"➰",t:"Subordinating conj.",d:"Adds a dependent clause",e:"because, although, when, if"},{icon:"❓",t:"Functional types",d:"Statement, question, command, exclamation",e:"You study. Do you? Study! How great!"},{icon:"⚙️",t:"Comma + FANBOYS",d:"Joins two independent clauses",e:"I came, and I saw."}],
    fc:[{f:"Simple sentence",h:"Sentence type",b:"One independent clause. It may still have a compound subject or verb.",e:"Mohammad teaches and writes."},{f:"Compound sentence",h:"Sentence type",b:"Two or more independent clauses joined by a comma + FANBOYS or a semicolon.",e:"She teaches, and he writes."},{f:"Complex sentence",h:"Sentence type",b:"One independent clause plus at least one dependent clause.",e:"Because it rained, we stayed."},{f:"Compound-complex",h:"Sentence type",b:"Two or more independent clauses plus at least one dependent clause.",e:"When the bell rang, she left and he stayed."},{f:"Coordinating conjunction",h:"Connector",b:"Joins equal grammatical parts — the FANBOYS.",e:"for, and, nor, but, or, yet, so"},{f:"Subordinating conjunction",h:"Connector",b:"Begins a dependent clause to build a complex sentence.",e:"because, although, when, if, since"},{f:"Functional types",h:"By purpose",b:"Declarative (statement), interrogative (question), imperative (command), exclamatory (strong feeling).",e:"You study. Do you study? Study! How you study!"},{f:"Comma splice",h:"Common error",b:"Two independent clauses joined by only a comma. Fix with a conjunction, semicolon, or period.",e:"I came, I saw. ✗"}],
    mcqBank:[{q:'"Mohammad teaches grammar." is a ___ sentence.',opts:["Compound","Simple","Complex","Compound-complex"],ans:1,exp:'One independent clause = a simple sentence.'},{q:"A compound sentence contains:",opts:["one independent clause","at least two independent clauses","one independent + one dependent clause","only dependent clauses"],ans:1,exp:'A compound sentence joins two or more independent clauses.'},{q:'"Because she studied, she passed." is:',opts:["Simple","Compound","Complex","Compound-complex"],ans:2,exp:'One dependent clause ("Because she studied") + one independent clause = complex.'},{q:"Which correctly joins two independent clauses?",opts:["I studied I passed.","I studied, I passed.","I studied, so I passed.","I studied so, I passed."],ans:2,exp:'Use a comma + a coordinating conjunction: "I studied, so I passed."'},{q:'"She teaches, and he writes." is a ___ sentence.',opts:["simple","compound","complex","compound-complex"],ans:1,exp:'Two independent clauses joined by a comma + "and" = compound.'},{q:"A complex sentence must contain:",opts:["two independent clauses","one independent and at least one dependent clause","only dependent clauses","no verbs"],ans:1,exp:'Complex = one independent clause + one or more dependent clauses.'},{q:'"When the bell rang, she left and he stayed." is:',opts:["Complex","Compound","Compound-complex","Simple"],ans:2,exp:'One dependent clause + two independent clauses = compound-complex.'},{q:"Which is a COMPOUND sentence?",opts:["After lunch, we studied.","We studied, but we were tired.","The tired students rested.","Although tired, we studied."],ans:1,exp:'"We studied, but we were tired" joins two independent clauses.'},{q:"A sentence that gives a command is:",opts:["declarative","interrogative","imperative","exclamatory"],ans:2,exp:'An imperative gives a command or request.'},{q:'"What a brilliant lecture that was!" is:',opts:["declarative","exclamatory","imperative","interrogative"],ans:1,exp:'It expresses strong feeling and ends with "!" — exclamatory.'},{q:'In "I was tired, so I rested," the word "so" is a:',opts:["subordinating conjunction","coordinating conjunction","relative pronoun","preposition"],ans:1,exp:'"So" is one of the FANBOYS — a coordinating conjunction.'},{q:"Joining two independent clauses with only a comma creates a:",opts:["complex sentence","comma splice","compound sentence","fragment"],ans:1,exp:'A comma alone cannot join two independent clauses — that is a comma splice.'},{q:'"Study hard." is which functional type?',opts:["interrogative","imperative","declarative","exclamatory"],ans:1,exp:'It commands the listener — imperative.'},{q:"A simple sentence can still contain:",opts:["two independent clauses","a compound subject or verb","a dependent clause","a comma splice"],ans:1,exp:'"Mohammad teaches and writes" is simple — one clause with a compound verb.'}],
    fillBank:[{b:"I studied hard,",a:"I passed the exam.",h:"FANBOYS (result)",ac:["so"],ex:'A comma + "so" joins two independent clauses → compound.'},{b:"",a:"it rained, we stayed inside.",h:"subordinator",ac:["because","since","as","when","after"],ex:'A subordinator makes the sentence complex.'},{b:"A sentence with one independent clause is",a:".",h:"sentence type",ac:["simple"],ex:'One independent clause = a simple sentence.'},{b:"A sentence with two independent clauses is",a:".",h:"sentence type",ac:["compound"],ex:'Two independent clauses joined = compound.'},{b:"She wanted to teach,",a:"she moved to Kuwait.",h:"FANBOYS (result)",ac:["so"],ex:'"so" joins the two independent clauses.'},{b:"We can study now",a:"we can rest first.",h:"FANBOYS (choice)",ac:["or"],ex:'"or" presents an alternative in a compound sentence.'},{b:"",a:"you finish early, you may leave.",h:"subordinator (condition)",ac:["if","when","once","after"],ex:'A subordinator opens the dependent clause of a complex sentence.'},{b:"The lecture was long,",a:"it was fascinating.",h:"FANBOYS (contrast)",ac:["but","yet"],ex:'"but/yet" joins contrasting independent clauses.'},{b:"A command sentence is called",a:".",h:"functional type",ac:["imperative"],ex:'An imperative gives a command or request.'},{b:"A question sentence is called",a:".",h:"functional type",ac:["interrogative"],ex:'An interrogative asks a question.'},{b:"I came,",a:"I saw, and I conquered.",h:"FANBOYS",ac:["and"],ex:'Three independent clauses joined with commas + "and."'},{b:"Although she was nervous,",a:"spoke clearly.",h:"subject pronoun",ac:["she"],ex:'The main clause "she spoke clearly" completes the complex sentence.'}],

  punctuation:{
    title:"Punctuation",sub:"Lesson 8 — Phase 2",
    intro:{tag:"Lesson 8",h:"Punctuation — The Signals That Shape Meaning",desc:"Punctuation tells the reader when to pause, stop, join, or separate — and it can change meaning entirely. The classic proof: \"Let's eat, Grandma\" invites Grandma to dinner; \"Let's eat Grandma\" does not. Master a handful of marks and your writing becomes both clearer and more precise."},
    rule:{t:"⚠️ Commas save lives",b:'Compare <em>Let’s eat, Grandma</em> with <em>Let’s eat Grandma</em>. One comma changes the whole meaning. Punctuation is not decoration — it is part of grammar. Learn what each mark signals: a <strong>pause</strong>, a <strong>full stop</strong>, a <strong>join</strong>, or <strong>ownership</strong>.'},
    defs:[{icon:"➕",t:"Comma (,)",d:"Brief pause; separates items and clauses",e:"We studied, and we rested."},{icon:"⏸️",t:"Semicolon (;)",d:"Links two related independent clauses",e:"She teaches; he writes."},{icon:"📋",t:"Colon (:)",d:"Introduces a list, explanation, or quote",e:"Bring three things: a pen, paper, focus."},{icon:"🔑",t:"Apostrophe (')",d:"Shows possession or a contraction",e:"Mohammad's class; it's ready"},{icon:"💬",t:"Quotation marks",d:"Enclose direct speech or titles",e:'She said, "Begin now."'},{icon:"➖",t:"Dash & hyphen",d:"Dash adds a break; hyphen joins words",e:"a well-known teacher — truly great"},{icon:"🚫",t:"its vs it's",d:"its = belonging to it; it's = it is",e:"It's late; the dog ate its food."},{icon:"⏹️",t:"End marks (. ? !)",d:"Close a statement, question, exclamation",e:"Stop. Why? Wow!"}],
    fc:[{f:"Comma (,)",h:"Punctuation",b:"Marks a brief pause; separates items in a list, sets off extra information, and follows introductory phrases.",e:"After class, we studied, talked, and left."},{f:"Semicolon (;)",h:"Punctuation",b:"Links two closely related independent clauses without a conjunction.",e:"She teaches; he writes."},{f:"Colon (:)",h:"Punctuation",b:"Introduces a list, explanation, or quotation after a complete clause.",e:"Bring three things: a pen, paper, and focus."},{f:"Apostrophe (')",h:"Punctuation",b:"Shows possession or marks a contraction.",e:"Mohammad's class; it's ready; don't"},{f:"Quotation marks",h:"Punctuation",b:"Enclose someone's exact words and certain titles.",e:'She said, "Begin now."'},{f:"Dash & hyphen",h:"Punctuation",b:"A dash (—) adds an emphatic break; a hyphen (-) joins compound words.",e:"a well-known teacher — truly inspiring"},{f:"its vs it's",h:"Key contrast",b:"its = belonging to it (no apostrophe); it's = it is or it has.",e:"The cat licked its paw. It's late."},{f:"End marks (. ? !)",h:"Punctuation",b:"Close a sentence: a period for statements and commands, a question mark for questions, an exclamation mark for strong feeling.",e:"Stop. Why? Wow!"}],
    mcqBank:[{q:"Which sentence is punctuated correctly?",opts:["Lets eat Grandma.","Let's eat, Grandma.","Lets eat, Grandma.","Let's eat Grandma."],ans:1,exp:'The contraction needs an apostrophe ("Let’s") and a comma sets off the direct address ("Grandma").'},{q:"A semicolon is best used to:",opts:["introduce a list","join two related independent clauses","show possession","end a question"],ans:1,exp:'A semicolon links two independent clauses without a conjunction.'},{q:"Which shows correct possession for one student?",opts:["the students books","the student's books","the students's books","the student's' books"],ans:1,exp:'Singular possessive: add apostrophe + s → "the student’s books."'},{q:'Choose the correct contraction of "it is":',opts:["its","it's","its'","it is'"],ans:1,exp:'"It’s" = it is. The possessive "its" has no apostrophe.'},{q:"A colon is used correctly in:",opts:["I need: a pen.","Bring three things: a pen, paper, and focus.","She said: that she was tired.","We left: because it was late."],ans:1,exp:'A colon follows a complete clause to introduce a list.'},{q:"Which sentence needs a comma?",opts:["She studied hard and passed.","After the lecture we left.","He reads books.","They teach grammar."],ans:1,exp:'Add a comma after the introductory phrase: "After the lecture, we left."'},{q:"The possessive of a plural noun ending in -s (e.g., teachers) is formed by:",opts:["adding 's","adding only an apostrophe after the s","adding s'","making no change"],ans:1,exp:'Plural possessive: teachers → teachers’ (apostrophe after the s).'},{q:"Direct speech is enclosed in:",opts:["parentheses","quotation marks","brackets","dashes"],ans:1,exp:'Quotation marks enclose a speaker’s exact words.'},{q:"Which uses the hyphen correctly?",opts:["a well known teacher","a well-known teacher","a wellknown teacher","a well known-teacher"],ans:1,exp:'"Well-known" is a hyphenated compound adjective before a noun.'},{q:'"Its" (no apostrophe) is:',opts:["a contraction of it is","a possessive pronoun","always incorrect","the same as it's"],ans:1,exp:'"Its" shows possession: "The dog ate its food."'},{q:"Two independent clauses with no conjunction can be linked with a:",opts:["comma","semicolon","hyphen","apostrophe"],ans:1,exp:'A semicolon links two independent clauses without a conjunction.'},{q:"A non-essential clause (extra information) is set off with:",opts:["no punctuation","commas on both sides","a colon","a hyphen"],ans:1,exp:'"My sister, who lives in Rochester, is a teacher." — commas surround the extra information.'},{q:"The Oxford (serial) comma appears:",opts:["after the first item only","before 'and' in a list of three or more","never in English","only in questions"],ans:1,exp:'The serial comma goes before the final "and": "a pen, paper, and focus."'},{q:'How should this indirect question end? "She asked whether I was ready___"',opts:["?",".","!",";"],ans:1,exp:'An indirect (reported) question ends with a period, not a question mark.'}],

    {id:"ten_present",icon:"🟢",title:"Present Tenses",desc:"Simple, Continuous, Perfect, and Perfect Continuous",
     intro:{tag:"Sub-lesson 1",h:"Present Tenses",desc:"The four present tenses let you talk about routines, ongoing actions, life experiences, and how long something has been happening. Each has a distinct signal and a distinct meaning. Master them and your students will never confuse 'I live' with 'I have lived.'"},
     rule:{t:"The four present tenses — a clear distinction",b:'<strong>Simple</strong>: permanent facts and habits. <em>She teaches English.</em><br><strong>Continuous</strong>: in progress right now / temporary. <em>She is teaching right now.</em><br><strong>Perfect</strong>: past action with present relevance. <em>She has taught here for years.</em><br><strong>Perfect Continuous</strong>: ongoing duration — emphasis on time. <em>She has been teaching for two hours.</em>'},

    {id:"ten_stative",icon:"🧊",title:"Stative Verbs & Used To",desc:"States vs actions, past habits, and a common mistake",
     intro:{tag:"Sub-lesson 4",h:"Stative Verbs & Used To",desc:'Stative verbs are a classic source of student errors. "I am knowing the answer" appears in Kuwait University essays and in international exams alike. Teaching this rule clearly — and the "used to" vs "would" distinction — sets you apart as a grammar expert.'},
     rule:{t:"Stative verbs — never use them in continuous forms",b:'Stative verbs describe <strong>states</strong> (not actions). They cannot normally appear in -ing form.<br><br><strong>Mental states:</strong> know, believe, understand, remember, forget, realize<br><strong>Emotional states:</strong> love, hate, like, prefer, want, need<br><strong>Senses:</strong> see, hear, smell, taste (as states)<br><strong>Possession:</strong> have, own, belong, contain'},
     points:[

       {icon:"🔀",t:"Dynamic vs stative meaning",d:"Some verbs change meaning with/without continuous form",e:"I have a meeting (own) vs I am having a meeting (taking part) | I see the point (understand) vs I am seeing a doctor (visiting)"},
