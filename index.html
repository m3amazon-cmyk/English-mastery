// ── Teach-first "Learn" content for each lesson overview ──
const LEARN={
  pos:{
    intro:'<strong>Every word</strong> in English does one of <strong>eight jobs</strong>. Naming that job — its part of speech — is the first step to reading any sentence with confidence.<br><br>The key idea: a word’s part of speech depends on <strong>how it is used</strong>, not on the word itself. <em>Book</em> is a noun in <em>read a book</em> but a verb in <em>book a flight</em>. Always look at the job the word does.',
    table:{head:["Part","Its job","Example"],rows:[["Noun","Names a person, place, thing, or idea","teacher, Kuwait, freedom"],["Pronoun","Replaces a noun","he, she, they, it"],["Verb","An action or state","teach, run, is"],["Adjective","Describes a noun","brilliant, cold, ancient"],["Adverb","Modifies a verb, adjective, or adverb","quickly, very, often"],["Preposition","Shows a relationship","in, on, at, for"],["Conjunction","Connects words or clauses","and, but, or, so"],["Interjection","Expresses emotion","Wow, Oops, Oh"]]},
    hook:"Recall the connectors with FANBOYS — the seven coordinating conjunctions: For, And, Nor, But, Or, Yet, So.",
    watch:"After a verb, use an adverb, not an adjective: she sings beautifully, not she sings beautiful. The -ly ending is usually the clue.",
    tips:"Have students label the job of each word in a real sentence instead of memorizing lists. The moment a learner sees the same word change roles — book a flight versus read a book — the idea clicks.",
    takeaways:["A word’s part of speech comes from its job in the sentence, not the word alone.","Adjectives describe nouns; adverbs modify verbs, adjectives, and other adverbs.","Prepositions show relationships, conjunctions connect, and interjections stand alone.","FANBOYS names the seven coordinating conjunctions."],
    check:{q:'In "She booked a flight," what part of speech is "booked"?',opts:["Noun","Verb","Adjective","Adverb"],ans:1,exp:'Here "booked" is the action, so it is a verb — even though "book" is a noun in other sentences.'}
  },
  articles:{
    intro:'Articles are the small words <strong>a, an, the</strong> that tell your listener whether a noun is <strong>specific</strong> or <strong>general</strong>. Tiny as they are, they are a big part of what makes English sound natural.<br><br>The golden rule is <strong>sound, not spelling</strong>: use <em>an</em> before a vowel sound (an hour, an MBA) and <em>a</em> before a consonant sound (a university, a one-way street).',
    table:{head:["Choice","When to use it","Example"],rows:[["the","Specific — both of you know which one","Pass me the book."],["a","General, before a consonant sound","I need a pen."],["an","General, before a vowel sound","She is an engineer."],["no article","Proper nouns, general plurals, uncountables","Kuwait is hot. Dogs are loyal."]]},
    hook:"Sound, not spelling. Say the next word aloud: a vowel sound takes an (an honest man); a consonant sound takes a (a university).",
    watch:"Uncountable nouns such as advice, information, and furniture take no a or an and have no plural form: useful advice, never a useful advice.",
    tips:"Drill the sound rule with the pairs learners trip on — an hour versus a university, an MBA versus a European. Reading them aloud beats any written rule, because the ear already knows the answer.",
    takeaways:["the = specific and known; a and an = general.","Pick a or an by the sound that follows, not the letter.","Proper nouns, general plurals, and uncountables usually take no article.","Superlatives and one-of-a-kind nouns take the: the best, the sun."],
    check:{q:'Which one is correct?',opts:["She has a MBA.","She has an MBA.","She has the MBA.","She has MBA."],ans:1,exp:'"MBA" begins with the vowel sound em, so it takes "an."'}
  },
  tenses:{
    intro:'English builds its <strong>twelve tenses</strong> from just two ingredients: <strong>time</strong> (past, present, future) and <strong>aspect</strong> (simple, continuous, perfect, perfect continuous).<br><br>Hold on to three ideas: <strong>simple</strong> states a fact, <strong>continuous</strong> shows something in progress, and <strong>perfect</strong> links one time to another. Combine a time with an aspect and any tense falls into place.',
    table:{head:["Aspect","What it shows","Example (present)"],rows:[["Simple","A fact or habit","She teaches."],["Continuous","In progress right now","She is teaching."],["Perfect","Linked to another time","She has taught."],["Perfect continuous","How long, up to now","She has been teaching."]]},
    hook:"Let the signal word pick the tense: since and for point to the perfect; yesterday and last year point to the past simple; when plus an interruption points to the past continuous; by plus a future time points to the future perfect.",
    watch:"Stative verbs — know, believe, understand, love, own — describe states, not actions, so they avoid the continuous: I understand, never I am understanding.",
    tips:"Draw a simple timeline and have students place since, yesterday, and by next year on it. Once the words have a position in time, the difference between the perfect and the simple stops feeling abstract.",
    takeaways:["Every tense is a time plus an aspect.","Simple is a fact, continuous is in progress, perfect connects to another time.","Signal words reliably point to the right tense.","Stative verbs do not take continuous forms."],
    check:{q:'"I ___ here since 2019." Which is correct?',opts:["live","lived","have lived","am living"],ans:2,exp:'"Since" links the past to now, so use the present perfect "have lived."'}
  },
  agreement:{
    intro:'Subject-verb agreement simply means the <strong>verb matches its subject in number</strong>: a singular subject takes a singular verb, and a plural subject takes a plural verb.<br><br>Almost every mistake comes from <strong>losing the real subject</strong> — usually because a phrase sits between it and the verb. Find the true subject first, and the rest is easy.',
    table:{head:["Subject","Verb","Example"],rows:[["Singular (he, she, it)","singular","She teaches."],["Plural (they)","plural","They teach."],["each, every, everyone","singular","Everyone is here."],["both, many, few","plural","Both are ready."],["collective (team) — American English","singular","The team is winning."]]},
    hook:"Cover up the words between the subject and the verb. In the box of books IS heavy, the subject is box, not books.",
    watch:"The indefinite pronouns each, every, everyone, everybody, and neither are always singular: everyone has a book, not everyone have a book.",
    tips:"Teach students to cross out any phrase that falls between the subject and the verb before they choose the verb. Removing the prepositional phrase makes the true subject obvious almost every time.",
    takeaways:["Match the verb to the real subject’s number.","Phrases between the subject and verb never change agreement — ignore them.","each, every, everyone, and neither are singular; both, many, and few are plural.","Collective nouns take a singular verb in American English."],
    check:{q:'Choose: "The list of names ___ on the desk."',opts:["are","is","were","have"],ans:1,exp:'The subject is "list" (singular); ignore "of names." Use "is."'}
  },
  phrases:{
    intro:'A <strong>phrase</strong> is a group of words that works together as a single unit but has <strong>no subject-verb pair</strong> of its own. Phrases are the chunks you slot together to build clauses and sentences.<br><br>Name a phrase by its <strong>head word</strong>: a noun phrase is built around a noun, a verb phrase around a verb, and so on.',
    table:{head:["Phrase","Built around","Example"],rows:[["Noun phrase","a noun","the talented teacher"],["Verb phrase","a verb","has been teaching"],["Adjective phrase","an adjective","proud of her work"],["Adverb phrase","an adverb","very carefully"],["Prepositional phrase","a preposition","in the classroom"]]},
    hook:"No subject and verb working together means it is a phrase. Add a subject doing a verb and it becomes a clause: in the morning is a phrase; because she teaches is a clause.",
    watch:"Keep a prepositional phrase next to what it describes, or the meaning drifts: she served sandwiches on paper plates to the students reads more clearly than the reverse order.",
    tips:"Ask students to bracket and label each phrase in a long sentence by its head word. Seeing a sentence as a few labeled chunks, rather than a row of separate words, is what makes complex grammar feel manageable.",
    takeaways:["A phrase is a unit of words with no subject-verb pair.","Name a phrase by its head word: noun, verb, adjective, adverb, or preposition.","A prepositional phrase works as an adjective or an adverb.","Keep a modifying phrase close to the word it modifies."],
    check:{q:'What kind of phrase is "in the lecture hall"?',opts:["Noun phrase","Verb phrase","Prepositional phrase","Adjective phrase"],ans:2,exp:'It opens with the preposition "in" and its object, so it is a prepositional phrase.'}
  },
  clauses:{
    intro:'A <strong>clause</strong> is the next step up from a phrase: it has a <strong>subject and a verb</strong> working together. That one feature decides everything.<br><br>If the clause expresses a complete thought, it is <strong>independent</strong> and can be a sentence. If a subordinating word leaves it hanging, it is <strong>dependent</strong> and must attach to an independent clause.',
    table:{head:["Clause","What it does","Example"],rows:[["Independent","Stands alone as a sentence","She teaches grammar."],["Dependent (adverbial)","Tells why, when, or how","because she loves it"],["Relative (adjective)","Describes a noun","who inspires us"],["Noun clause","Acts as a noun","what she said"]]},
    hook:"Find the subject-verb pair, then ask: can it stand alone? Yes means independent; no means dependent.",
    watch:"A dependent clause on its own is a fragment. 'Because she studied.' is not a sentence — attach it: 'She passed because she studied.'",
    tips:"Have students underline every subject once and its verb twice, then bracket each clause. Counting the clauses is the fastest route to naming any sentence type in the next lesson.",
    takeaways:["A clause has a subject and a verb; a phrase does not.","Independent clauses stand alone; dependent clauses cannot.","Relative clauses describe nouns; noun clauses fill noun slots.","A lone dependent clause is a fragment."],
    check:{q:"Which group of words is a dependent clause?",opts:["She passed the exam.","because she studied hard","in the morning","a brilliant young student"],ans:1,exp:'"because she studied hard" has a subject and verb but cannot stand alone — dependent. The others either stand alone or have no subject-verb pair.'}
  },
  sentencetypes:{
    intro:'Every sentence is built from clauses, so once you can count clauses you can name any sentence. There are four <strong>structural</strong> types — simple, compound, complex, and compound-complex — set by how many independent and dependent clauses you combine.<br><br>Separately, every sentence has a <strong>purpose</strong>: it states, asks, commands, or exclaims. Varying both is what gives writing its rhythm.',
    table:{head:["Type","Clauses","Example"],rows:[["Simple","1 independent","She teaches."],["Compound","2+ independent","She teaches, and he writes."],["Complex","1 independent + 1+ dependent","Because it rained, we stayed."],["Compound-complex","2+ independent + 1+ dependent","When it rang, she left and he stayed."]]},
    hook:"Count the independent clauses first, then the dependent ones. The two numbers name the sentence.",
    watch:"Joining two independent clauses with only a comma is a comma splice. Use a comma + FANBOYS, a semicolon, or a period.",
    tips:"Give students one idea and ask them to write it four ways — simple, compound, complex, and compound-complex. Seeing the same content reshaped makes sentence variety concrete.",
    takeaways:["Simple = one independent clause; compound = two or more independent.","Complex adds a dependent clause; compound-complex adds both.","Join independent clauses with a comma + FANBOYS or a semicolon.","Functional types: declarative, interrogative, imperative, exclamatory."],
    check:{q:'"Although she was tired, she finished the report." is which type?',opts:["Simple","Compound","Complex","Compound-complex"],ans:2,exp:'One dependent clause ("Although she was tired") plus one independent clause = complex.'}
  },
  punctuation:{
    intro:'Punctuation is part of grammar, not decoration. Each mark is a <strong>signal</strong> that tells the reader to pause, stop, join, or separate — and the wrong mark can change your meaning entirely.<br><br>Focus on the high-value marks: the <strong>comma</strong> (pause and separate), the <strong>semicolon and colon</strong> (join and introduce), and the <strong>apostrophe</strong> (possession and contraction).',
    table:{head:["Mark","Its job","Example"],rows:[["Comma (,)","Pause; separate; set off","After class, we ate, talked, and left."],["Semicolon (;)","Join two independent clauses","She teaches; he writes."],["Colon (:)","Introduce a list or explanation","Bring this: focus."],["Apostrophe (')","Possession or contraction","Mohammad's class; it's ready"]]},
    hook:"Commas save lives: 'Let's eat, Grandma' versus 'Let's eat Grandma.'",
    watch:"its = belonging to it; it's = it is. If you can replace the word with 'it is,' use the apostrophe.",

let DS={};
function dsk(l,a){return l+"_"+a;}
function ds(l,a){const k=dsk(l,a);if(!DS[k]){const att=getRC(l,a);DS[k]={qi:0,ans:false,sel:null,tapped:[],fv:"",roAns:[],roShuf:null,mSel:null,mDone:{},mShuf:null,score:0,done:false,fi:0,ff:false,fb:null,att,qs:null};}return DS[k];}
function resetDS(l,a){incRC(l,a);delete DS[dsk(l,a)];}
function shuffleIdx(n){const a=[];for(let i=0;i<n;i++)a.push(i);return shuffle(a);}
// Persistent shuffled queue per lesson+activity: serves the NEXT unseen questions
// each attempt and only reshuffles once the whole bank has been used (no repeats until then).
function drawQ(key,len,n){if(len<=0)return[];if(!ST.qpool)ST.qpool={};let p=ST.qpool[key];if(!p||!p.order||p.order.length!==len)p={order:shuffleIdx(len),pos:0};if(p.pos+n>p.order.length)p={order:shuffleIdx(len),pos:0};const idx=p.order.slice(p.pos,p.pos+n);p.pos+=n;ST.qpool[key]=p;saveLocal();return idx;}
function getQs(l,a){const d=ds(l,a);if(d.qs)return d.qs;const les=LD[l];let qs;if(a==="mcq"){const bank=les.mcqBank||[];qs=drawQ(l+"_mcq",bank.length,Math.min(6,bank.length)).map(i=>bank[i]);}else if(a==="fill"){const bank=les.fillBank||[];qs=drawQ(l+"_fill",bank.length,Math.min(5,bank.length)).map(i=>bank[i]);}else if(a==="match"){const bank=les.matchBank||[];qs=drawQ(l+"_match",bank.length,1).map(i=>bank[i]);}else if(a==="tap"){const bank=les.tapBank||[];qs=drawQ(l+"_tap",bank.length,Math.min(4,bank.length)).map(i=>bank[i]);}else if(a==="err"){const bank=les.errBank||[];qs=drawQ(l+"_err",bank.length,Math.min(6,bank.length)).map(i=>bank[i]);}d.qs=qs;return qs;}

function renderFill(lid,el){const d=ds(lid,"fill"),qs=getQs(lid,"fill");if(d.done){el.innerHTML=doneBanner(lid,"fill",d.score,qs.length,"match");return;}const q=qs[d.qi],v=d.fv||"";let ic="fill-inp"+(d.ans?(d.fb&&d.fb.t==="ok"?" ok":" bad"):"");let h=`<div class="qwrap"><div class="qwrap-top"><div class="qwrap-title">✏️ Fill in the blank</div><div class="qright"><div class="qcounter">${d.qi+1}/${qs.length}</div><span class="sbadge">Set ${d.att+1}</span></div></div><div class="qprog"><div class="qprog-fill" style="width:${(d.qi/qs.length)*100}%"></div></div><div class="q-text">Complete the sentence with the correct verb form.</div><div class="fill-sent">${hl(q.b)} <input id="fi" type="text" class="${ic}" placeholder="${q.h}" value="${v}" ${d.ans?"readonly":""} oninput="fType('${lid}',this.value)" onkeydown="if(event.key==='Enter'&&!${d.ans})fChk('${lid}')"/> ${hl(q.a)}</div><div class="hint-tag">Hint: ${q.h}</div>`;if(d.fb)h+=`<div class="fb fb-${d.fb.t}"><div class="fb-icon">${d.fb.t==="ok"?"✅":"❌"}</div><div>${hl(d.fb.m)}</div></div>`;h+=`<div class="btn-row">`;if(!d.ans)h+=`<button class="btn primary" onclick="fChk('${lid}')">Check ✓</button>`;if(d.ans&&d.qi<qs.length-1)h+=`<button class="btn primary" onclick="fNext('${lid}')">Next →</button>`;if(d.ans&&d.qi===qs.length-1)h+=`<button class="btn success" onclick="fNext('${lid}')">Finish 🎉</button>`;h+=`</div></div>`;el.innerHTML=h;const inp=document.getElementById("fi");if(inp&&!d.ans)setTimeout(()=>inp.focus(),80);}

function fChk(lid){const d=ds(lid,"fill"),qs=getQs(lid,"fill"),q=qs[d.qi];const v=(d.fv||"").trim().toLowerCase();if(!v){d.fb={t:"info",m:"Type an answer first."};rerender(lid,"fill");return;}const ok=q.ac.map(a=>a.toLowerCase()).some(a=>a===v);d.ans=true;d.fb={t:ok?"ok":"bad",m:ok?"Correct! "+q.ex:"A good answer: \""+q.ac[0]+"\". "+q.ex};if(ok){d.score++;addXP(8);}rerender(lid,"fill");}

function renderTap(lid,el){const d=ds(lid,"tap"),qs=getQs(lid,"tap");if(d.done){el.innerHTML=doneBanner(lid,"tap",d.score,qs.length,"err");return;}const q=qs[d.qi];if(!d.tapped)d.tapped=[];let h=`<div class="qwrap"><div class="qwrap-top"><div class="qwrap-title">👆 Tap the word</div><div class="qright"><div class="qcounter">${d.qi+1}/${qs.length}</div><span class="sbadge">Set ${d.att+1}</span></div></div><div class="qprog"><div class="qprog-fill" style="width:${(d.qi/qs.length)*100}%"></div></div><div class="q-text">${hl(q.task)}</div><div class="tap-sent">`;q.s.forEach((w,i)=>{let cls="tap-word";if(d.ans){if(q.correct.includes(i))cls+=" correct";else if(d.tapped.includes(i))cls+=" wrong";}else if(d.tapped.includes(i))cls+=" sel";h+=`<span class="${cls}" ${d.ans?"":"onclick=\"tW('"+lid+"',"+i+")\""}>${w}</span> `;});h+=`</div>`;if(d.fb)h+=`<div class="fb fb-${d.fb.t}"><div class="fb-icon">${d.fb.t==="ok"?"✅":"❌"}</div><div>${hl(d.fb.m)}</div></div>`;h+=`<div class="btn-row">`;if(!d.ans)h+=`<button class="btn primary" onclick="tChk('${lid}')">Check ✓</button>`;if(d.ans&&d.qi<qs.length-1)h+=`<button class="btn primary" onclick="tNext('${lid}')">Next →</button>`;if(d.ans&&d.qi===qs.length-1)h+=`<button class="btn success" onclick="tNext('${lid}')">Finish 🎉</button>`;h+=`</div></div>`;el.innerHTML=h;}
function tW(lid,i){const d=ds(lid,"tap");if(d.ans)return;const x=d.tapped.indexOf(i);if(x>-1)d.tapped.splice(x,1);else d.tapped.push(i);rerender(lid,"tap");}
function tChk(lid){const d=ds(lid,"tap"),qs=getQs(lid,"tap"),q=qs[d.qi];if(!d.tapped||!d.tapped.length){d.fb={t:"info",m:"Tap at least one word first."};rerender(lid,"tap");return;}const ok=q.correct.every(i=>d.tapped.includes(i))&&d.tapped.every(i=>q.correct.includes(i));d.ans=true;d.fb={t:ok?"ok":"bad",m:q.ex};if(ok){d.score++;addXP(8);}rerender(lid,"tap");}
function tNext(lid){const d=ds(lid,"tap"),qs=getQs(lid,"tap");if(d.qi<qs.length-1){d.qi++;d.ans=false;d.tapped=[];d.fb=null;rerender(lid,"tap");}else{d.done=true;markActDone(lid,"tap",d.score,qs.length);rerender(lid,"tap");}}


function renderErr(lid,el){const d=ds(lid,"err"),qs=getQs(lid,"err");if(d.done){el.innerHTML=doneBanner(lid,"err",d.score,qs.length,null);return;}const q=qs[d.qi];let h=`<div class="qwrap"><div class="qwrap-top"><div class="qwrap-title">🔍 Error Fix</div><div class="qright"><div class="qcounter">${d.qi+1}/${qs.length}</div><span class="sbadge">Set ${d.att+1}</span></div></div><div class="qprog"><div class="qprog-fill" style="width:${(d.qi/qs.length)*100}%"></div></div><div class="q-text">Find the error and pick the corrected version.</div><div class="err-sent-box">✗ ${q.wrong}</div><div class="mcq-opts">`;q.opts.forEach((o,i)=>{let cls="mcq-opt";if(d.ans){if(i===q.ans)cls+=" correct";else if(i===d.sel&&i!==q.ans)cls+=" wrong";}else if(i===d.sel)cls+=" sel";h+=`<div class="${cls}" ${d.ans?"":"onclick=\"eSel('"+lid+"',"+i+")\""}><div class="opt-key">${String.fromCharCode(65+i)}</div>${o}</div>`;});h+=`</div>`;if(d.fb)h+=`<div class="fb fb-${d.fb.t}"><div class="fb-icon">${d.fb.t==="ok"?"✅":"❌"}</div><div>${hl(d.fb.m)}</div></div>`;h+=`<div class="btn-row">`;if(!d.ans)h+=`<button class="btn primary" onclick="eChk('${lid}')">Check ✓</button>`;if(d.ans&&d.qi<qs.length-1)h+=`<button class="btn primary" onclick="eNext('${lid}')">Next →</button>`;if(d.ans&&d.qi===qs.length-1)h+=`<button class="btn success" onclick="eNext('${lid}')">Finish 🎉</button>`;h+=`</div></div>`;el.innerHTML=h;}
function eSel(lid,i){const d=ds(lid,"err");if(d.ans)return;d.sel=i;d.fb=null;rerender(lid,"err");}
function eChk(lid){const d=ds(lid,"err"),qs=getQs(lid,"err"),q=qs[d.qi];if(d.sel===null){d.fb={t:"info",m:"Select an answer first."};rerender(lid,"err");return;}const ok=d.sel===q.ans;d.ans=true;d.fb={t:ok?"ok":"bad",m:q.exp};if(ok){d.score++;addXP(10);}rerender(lid,"err");}
function eNext(lid){const d=ds(lid,"err"),qs=getQs(lid,"err");if(d.qi<qs.length-1){d.qi++;d.ans=false;d.sel=null;d.fb=null;rerender(lid,"err");}else{d.done=true;markActDone(lid,"err",d.score,qs.length);rerender(lid,"err");}}

// ── Write your own: self-check writing activity + personal example bank ──

function exampleBankHTML(lid){const ex=getExamples(lid);if(!ex.length)return "";let h=`<div class="bank-box"><div class="bank-h">📓 Your sentence bank</div><div class="bank-sub">Saved sentences for this lesson — reuse them as your own classroom examples.</div>`;ex.forEach((e,i)=>{h+=`<div class="bank-item ${e.rating}"><button class="bank-del" title="Delete" onclick="delExample('${lid}',${i})">×</button><div class="bank-task">${esc(e.task)}</div><div class="bank-text">${esc(e.text)}</div></div>`;});return h+`</div>`;}
function renderWrite(lid,el){const prompts=writeBank(lid),d=ds(lid,"write");if(!prompts.length){el.innerHTML='<div class="card"><div class="intro-desc">Writing prompts unlock once this lesson has content.</div></div>';return;}if(d.done){el.innerHTML=doneBanner(lid,"write",d.score,prompts.length,null)+exampleBankHTML(lid);return;}if(d.wv===undefined)d.wv="";const q=prompts[d.qi];let h=`<div class="qwrap"><div class="qwrap-top"><div class="qwrap-title">✍️ Write your own</div><div class="qright"><div class="qcounter">${d.qi+1}/${prompts.length}</div></div></div><div class="qprog"><div class="qprog-fill" style="width:${(d.qi/prompts.length)*100}%"></div></div><div class="q-text">${hl(q.task)}</div>`;h+=`<textarea id="wt" class="write-ta" placeholder="Type your sentence here…" ${d.wRev?"readonly":""} oninput="wType('${lid}',this.value)">${esc(d.wv)}</textarea>`;if(!d.wRev){h+=`<div class="hint-tag">Write your best attempt, then reveal a model answer to check yourself.</div><div class="btn-row"><button class="btn primary" onclick="wReveal('${lid}')">Reveal model answer →</button></div>`;}else{h+=`<div class="callout tip"><div class="callout-t">💡 Model answer</div><div>${hl(q.model)}</div></div>`;h+=`<div class="callout hook"><div class="callout-t">Does your sentence…</div><ul class="write-cl">${q.checklist.map(c=>`<li>${hl(c)}</li>`).join("")}</ul></div>`;h+=`<div class="q-text" style="font-size:14px;margin-bottom:8px">How did you do?</div><div class="btn-row"><button class="btn success" onclick="wRate('${lid}',true)">✓ Nailed it (+10 XP)</button><button class="btn" onclick="wRate('${lid}',false)">✎ Needs review (+5 XP)</button></div>`;}h+=`</div>`;h+=exampleBankHTML(lid);el.innerHTML=h;const ta=document.getElementById("wt");if(ta&&!d.wRev)setTimeout(()=>ta.focus(),80);}
function wType(lid,v){ds(lid,"write").wv=v;}
function wReveal(lid){const d=ds(lid,"write");const ta=document.getElementById("wt");if(ta)d.wv=ta.value;if(!(d.wv||"").trim()){toast("Write a sentence first ✍️");return;}d.wRev=true;rerender(lid,"write");}
function wRate(lid,nailed){const d=ds(lid,"write"),prompts=writeBank(lid),q=prompts[d.qi];saveExample(lid,q.task,(d.wv||"").trim(),nailed);if(nailed){d.score++;addXP(10);}else{addXP(5);}if(d.qi<prompts.length-1){d.qi++;d.wv="";d.wRev=false;rerender(lid,"write");}else{d.done=true;markActDone(lid,"write",d.score,prompts.length);rerender(lid,"write");}}

function doneBanner(lid,act,score,total,nextAct){const pct=Math.round((score/total)*100);const em=pct===100?"🏆":pct>=70?"🎉":"💪";return `<div class="done-card"><div class="done-emoji">${em}</div><div class="done-title">${pct===100?"Perfect score!":pct>=70?"Great work!":"Keep practicing!"}</div><div class="done-score">${score}/${total} · ${pct}%</div><div class="done-sub">${pct===100?"You nailed every question.":pct>=70?"Strong effort — review any misses.":"Every attempt makes you stronger."}</div><div class="btn-row" style="justify-content:center"><button class="btn" onclick="retryAct('${lid}','${act}')">↺ New set</button>${nextAct?`<button class="btn primary" onclick="switchAct('${lid}','${nextAct}')">Next →</button>`:`<button class="btn success" onclick="goHome()">🏠 Home</button>`}</div></div>`;}
function retryAct(lid,act){resetDS(lid,act);rerender(lid,act);}

// ── Comprehension quiz: cumulative MCQ + Error-Fix pool from all lessons up to this one ──
function priorLessonIds(lid){const all=PHASES.flatMap(p=>p.lessons);const me=all.find(l=>l.id===lid);if(!me)return [lid];return all.filter(l=>l.num<=me.num&&LD[l.id]&&LD[l.id].mcqBank).map(l=>l.id);}
function buildCompPool(lid){const pool=[];priorLessonIds(lid).forEach(id=>{const L=LD[id];(L.mcqBank||[]).forEach(q=>pool.push({kind:"mcq",prompt:q.q,opts:q.opts,ans:q.ans,exp:q.exp,from:L.title}));(L.errBank||[]).forEach(q=>pool.push({kind:"err",prompt:"Pick the corrected version:",sent:q.wrong,opts:q.opts,ans:q.ans,exp:q.exp,from:L.title}));});return pool;}
function getCompQs(lid){const d=ds(lid,"comp");if(d.qs)return d.qs;const pool=buildCompPool(lid);const n=Math.min(12,pool.length);d.qs=drawQ(lid+"_comp",pool.length,n).map(i=>pool[i]);return d.qs;}
function renderComp(lid,el){const d=ds(lid,"comp"),qs=getCompQs(lid);if(!qs.length){el.innerHTML='<div class="card"><div class="intro-desc">Comprehension unlocks once this lesson has content.</div></div>';return;}if(d.done){el.innerHTML=doneBanner(lid,"comp",d.score,qs.length,null);return;}const q=qs[d.qi];let h=`<div class="qwrap"><div class="qwrap-top"><div class="qwrap-title">🎯 Comprehension</div><div class="qright"><div class="qcounter">${d.qi+1}/${qs.length}</div><span class="sbadge">Set ${d.att+1}</span></div></div><div class="qprog"><div class="qprog-fill" style="width:${(d.qi/qs.length)*100}%"></div></div><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">From: ${q.from}</div><div class="q-text">${hl(q.prompt)}</div>`;if(q.kind==="err")h+=`<div class="err-sent-box">✗ ${q.sent}</div>`;h+=`<div class="mcq-opts">`;q.opts.forEach((o,i)=>{let cls="mcq-opt";if(d.ans){if(i===q.ans)cls+=" correct";else if(i===d.sel&&i!==q.ans)cls+=" wrong";}else if(i===d.sel)cls+=" sel";h+=`<div class="${cls}" ${d.ans?"":"onclick=\"cSel('"+lid+"',"+i+")\""}><div class="opt-key">${String.fromCharCode(65+i)}</div>${o}</div>`;});h+=`</div>`;if(d.fb)h+=`<div class="fb fb-${d.fb.t}"><div class="fb-icon">${d.fb.t==="ok"?"✅":"❌"}</div><div>${hl(d.fb.m)}</div></div>`;h+=`<div class="btn-row">`;if(!d.ans)h+=`<button class="btn primary" onclick="cChk('${lid}')">Check ✓</button>`;if(d.ans&&d.qi<qs.length-1)h+=`<button class="btn primary" onclick="cNext('${lid}')">Next →</button>`;if(d.ans&&d.qi===qs.length-1)h+=`<button class="btn success" onclick="cNext('${lid}')">Finish 🎉</button>`;h+=`</div></div>`;el.innerHTML=h;}
function cSel(lid,i){const d=ds(lid,"comp");if(d.ans)return;d.sel=i;d.fb=null;rerender(lid,"comp");}
function cChk(lid){const d=ds(lid,"comp"),qs=getCompQs(lid),q=qs[d.qi];if(d.sel==null){d.fb={t:"info",m:"Select an answer first."};rerender(lid,"comp");return;}const ok=d.sel===q.ans;d.ans=true;d.fb={t:ok?"ok":"bad",m:q.exp};if(ok){d.score++;addXP(8);}rerender(lid,"comp");}
function cNext(lid){const d=ds(lid,"comp"),qs=getCompQs(lid);if(d.qi<qs.length-1){d.qi++;d.ans=false;d.sel=null;d.fb=null;rerender(lid,"comp");}else{d.done=true;markActDone(lid,"comp",d.score,qs.length);rerender(lid,"comp");}}

// ── Phase final exams: cumulative pool, graded at the end, pass mark + badge ──
let curExam=null;
function phaseLastLid(i){const ls=PHASES[i].lessons;return ls[ls.length-1].id;}
function phaseExamReady(i){return PHASES[i].lessons.every(l=>LD[l.id]&&LD[l.id].mcqBank);}
function examCovered(i){return priorLessonIds(phaseLastLid(i)).length;}
function examN(i){return Math.min(50,buildCompPool(phaseLastLid(i)).length);}
function getExamQs(i){const d=ds("p"+i,"exam");if(d.qs)return d.qs;const pool=buildCompPool(phaseLastLid(i));const n=Math.min(examN(i),pool.length);d.qs=drawQ("p"+i+"_exam",pool.length,n).map(x=>pool[x]);return d.qs;}
function phaseShort(i){return PHASES[i].label.replace(/^Phase \d+\s*[—-]\s*/,"");}
function examCardHTML(i,ph){const ex=ST.exam&&ST.exam["p"+i];const passed=ex&&ex.passed;return `<div class="exam-card${passed?" passed":""}" onclick="openExam(${i})"><div class="exam-ico">${passed?"🏅":"📝"}</div><div class="exam-info"><div class="exam-title">${phaseShort(i)} — Final Exam</div><div class="exam-sub">${ex?(passed?"Passed · best "+ex.best+"%":"Best "+ex.best+"% · pass 80%"):examN(i)+" questions · pass 80%"}</div></div><div class="exam-go">→</div></div>`;}
function openExam(i){curExam=i;ds("p"+i,"exam");document.getElementById("exam-t").textContent=phaseShort(i)+" — Final Exam";document.getElementById("exam-s").textContent=PHASES[i].label.split(/[—-]/)[0].trim()+" · pass 80%";showScreen("scr-exam");document.getElementById("exam-scroll").scrollTop=0;renderExamIntro(i);}
function renderExamIntro(i){const ex=ST.exam&&ST.exam["p"+i];document.getElementById("exam-body").innerHTML=`<div class="card" style="text-align:center"><div style="font-size:42px;margin-bottom:6px">${ex&&ex.passed?"🏅":"📝"}</div><div class="intro-h">${phaseShort(i)} — Final Exam</div><div class="intro-desc">${examN(i)} questions drawn from everything you have learned up to this phase. You will be graded at the end — the pass mark is <strong>80%</strong>.${ex?` Your best so far: <strong>${ex.best}%</strong>${ex.passed?" · passed ✓":""}.`:""}</div><button class="btn primary" style="width:100%;margin-top:14px" onclick="startExam(${i})">${ex?"Retake exam":"Start exam"} →</button></div>`;}
function startExam(i){resetDS("p"+i,"exam");const d=ds("p"+i,"exam");d.answers=[];d.qi=0;d.submitted=false;getExamQs(i);document.getElementById("exam-scroll").scrollTop=0;renderExam();}
function renderExam(){const i=curExam,d=ds("p"+i,"exam"),qs=getExamQs(i);if(d.submitted){renderExamResults(i);return;}if(!d.answers)d.answers=[];const q=qs[d.qi];const answered=d.answers.filter(a=>a!=null).length;let h=`<div class="qwrap"><div class="exam-q-meta"><span>Question ${d.qi+1} of ${qs.length}</span><span>${answered}/${qs.length} answered</span></div><div class="qprog"><div class="qprog-fill" style="width:${((d.qi+1)/qs.length)*100}%"></div></div><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">From: ${q.from}</div><div class="q-text">${hl(q.prompt)}</div>`;if(q.kind==="err")h+=`<div class="err-sent-box">✗ ${q.sent}</div>`;h+=`<div class="mcq-opts">`;q.opts.forEach((o,k)=>{h+=`<div class="mcq-opt${d.answers[d.qi]===k?" sel":""}" onclick="examSel(${k})"><div class="opt-key">${String.fromCharCode(65+k)}</div>${o}</div>`;});h+=`</div><div class="btn-row">`;if(d.qi>0)h+=`<button class="btn" onclick="examNav(-1)">← Prev</button>`;if(d.qi<qs.length-1)h+=`<button class="btn primary" onclick="examNav(1)">Next →</button>`;if(d.qi===qs.length-1)h+=`<button class="btn success" onclick="examSubmit()">Submit exam ✓</button>`;h+=`</div></div>`;document.getElementById("exam-body").innerHTML=h;}
function examSel(k){const d=ds("p"+curExam,"exam");if(!d.answers)d.answers=[];d.answers[d.qi]=k;renderExam();}
function examNav(dir){const d=ds("p"+curExam,"exam"),qs=getExamQs(curExam);d.qi=Math.max(0,Math.min(qs.length-1,d.qi+dir));document.getElementById("exam-scroll").scrollTop=0;renderExam();}
function examSubmit(){const i=curExam,d=ds("p"+i,"exam"),qs=getExamQs(i);const unans=qs.length-d.answers.filter(a=>a!=null).length;if(unans>0&&!confirm(unans+" question(s) still unanswered. Submit anyway?"))return;let score=0;qs.forEach((q,k)=>{if(d.answers[k]===q.ans)score++;});d.score=score;d.submitted=true;const pct=Math.round((score/qs.length)*100),passed=pct>=80;if(!ST.exam)ST.exam={};const prev=ST.exam["p"+i]||{best:0,passed:false};const newlyPassed=passed&&!prev.passed;ST.exam["p"+i]={best:Math.max(prev.best||0,pct),passed:prev.passed||passed};addXP(score*5+(newlyPassed?100:0));saveST();if(passed)toast(newlyPassed?"🏅 Phase mastered! +100 XP":"✓ Passed again!");document.getElementById("exam-scroll").scrollTop=0;renderExam();}
function renderExamResults(i){const d=ds("p"+i,"exam"),qs=getExamQs(i);const pct=Math.round((d.score/qs.length)*100),passed=pct>=80;let h=`<div class="done-card"><div class="done-emoji">${passed?"🏅":"📚"}</div><div class="done-title">${passed?"Phase mastered!":"Keep going!"}</div><div class="done-score">${d.score}/${qs.length} · ${pct}%</div><div class="done-sub">${passed?"You passed the final exam for this phase.":"Pass mark is 80% — review the misses below and retake."}</div><div class="btn-row" style="justify-content:center"><button class="btn primary" onclick="startExam(${i})">↺ Retake</button><button class="btn success" onclick="goHome()">🏠 Home</button></div></div>`;const misses=qs.map((q,k)=>({q:q,k:k})).filter(o=>d.answers[o.k]!==o.q.ans);if(misses.length){h+=`<div class="exp-h" style="margin:16px 0 8px">Review — ${misses.length} to revisit</div>`;misses.forEach(o=>{const q=o.q,your=d.answers[o.k];h+=`<div class="exam-review-item"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px">From: ${q.from}</div><div style="font-weight:700;font-size:13.5px;margin-bottom:6px">${hl(q.prompt)}</div>${q.kind==="err"?`<div class="err-sent-box" style="margin-bottom:6px">✗ ${q.sent}</div>`:""}<div style="font-size:12.5px;color:var(--red-dark);margin-bottom:2px">Your answer: ${your!=null?q.opts[your]:"(blank)"}</div><div style="font-size:12.5px;color:var(--green-dark);margin-bottom:4px">Correct: ${q.opts[q.ans]}</div><div style="font-size:12px;color:var(--muted);line-height:1.5">${hl(q.exp)}</div></div>`;});}document.getElementById("exam-body").innerHTML=h;}

// SUB-LESSON NAVIGATION
let curSL=null;
const SUB_TABS=[{id:"overview",label:"📖 Overview"},{id:"mcq",label:"❓ Quiz"},{id:"fill",label:"✏️ Fill Blank"}];
function openSubLesson(lid,slid){
  curSL=slid;
  const sl=LD[lid].sublessons.find(s=>s.id===slid);
  if(!sl)return;
  // Register sub-lesson data in LD so existing ds/getQs functions work
  if(!LD[slid])LD[slid]={title:sl.title,sub:LD[lid].sub,mcqBank:sl.mcqBank,fillBank:sl.fillBank,matchBank:[],tapBank:[],errBank:[]};
  document.getElementById("sub-t").textContent=sl.title;
  document.getElementById("sub-s").textContent=LD[lid].title+" — "+LD[lid].sub.split("—")[1].trim();
  showScreen("scr-sub");
  buildSubTabs(lid,slid,"overview");
  showSubAct(lid,slid,"overview");
}
function closeSubLesson(){curSL=null;showScreen("scr-lesson");buildTabs(curL);showAct(curL,"overview");}
function buildSubTabs(lid,slid,activeAct){
  const row=document.getElementById("sub-tabs-row");row.innerHTML="";
  SUB_TABS.forEach(t=>{
    const isDone=t.id!=="overview"&&ST.actDone[slid]&&ST.actDone[slid][t.id];
    const score=isDone?actScore(slid,t.id):null;
    const btn=document.createElement("div");
    btn.className="tab"+(activeAct===t.id?" active":"")+(isDone?" done-tab":"");
    btn.textContent=isDone?(score!==null?t.label+" "+score+"%":t.label+" ✓"):t.label;
    btn.onclick=()=>{buildSubTabs(lid,slid,t.id);showSubAct(lid,slid,t.id);};
    row.appendChild(btn);
  });
}
function showSubAct(lid,slid,act){
  const p=document.getElementById("sub-panels");p.innerHTML="";
  document.getElementById("sub-scroll").scrollTop=0;
  const sl=LD[lid].sublessons.find(s=>s.id===slid);
  if(act==="overview")p.innerHTML=renderSubOV(sl,lid,slid);
  else if(act==="mcq")renderSubMCQ(lid,slid,p);
  else if(act==="fill")renderSubFill(lid,slid,p);
}
function renderSubOV(sl,lid,slid){
  const sc=subCompletion(slid);
  const qS=actScore(slid,"mcq"),fS=actScore(slid,"fill");
  const qDone=ST.actDone[slid]&&ST.actDone[slid].mcq,fDone=ST.actDone[slid]&&ST.actDone[slid].fill;
  let progBar=`<div style="display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:14px;flex-wrap:wrap;gap:8px">`;
  progBar+=`<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px">COMPLETION</div><div style="height:6px;background:var(--border);border-radius:99px;overflow:hidden"><div style="height:6px;width:${sc.pct}%;background:${sc.pct===100?"var(--green)":"var(--primary)"};border-radius:99px;transition:width .4s"></div></div></div>`;
  progBar+=`<div style="display:flex;gap:6px;flex-shrink:0">`;
  progBar+=`<span class="sl-act-pill ${qDone?"done":"todo"}">Quiz${qDone&&qS!==null?" "+qS+"%":""}</span>`;
  progBar+=`<span class="sl-act-pill ${fDone?"done":"todo"}">Fill${fDone&&fS!==null?" "+fS+"%":""}</span>`;
  progBar+=`<span style="font-size:11px;font-weight:700;color:${sc.pct===100?"var(--green-dark)":"var(--muted)"}">${sc.pct}%</span>`;
  progBar+=`</div></div>`;
  let h=`<div class="card"><div class="intro-tag">${sl.intro.tag}</div><div class="intro-h">${sl.intro.h}</div><div class="intro-desc">${sl.intro.desc}</div></div>`;
  h+=progBar;
  if(sl.rule)h+=`<div class="rule-box"><div class="rule-t">${sl.rule.t}</div><div class="rule-b">${sl.rule.b}</div></div>`;
  if(sl.points&&sl.points.length){
    h+=`<div class="exp-section"><div class="exp-h">Key Concepts</div>`;
    sl.points.forEach(p=>{h+=`<div class="exp-point"><div class="exp-point-icon">${p.icon}</div><div class="exp-point-body"><div class="exp-point-t">${p.t}</div><div class="exp-point-d">${hl(p.d)}</div>${p.e?`<div class="exp-point-e">${hl(p.e)}</div>`:""}</div></div>`;});
    h+=`</div>`;
  }
  h+=`<button class="btn primary" style="width:100%;margin-bottom:14px" onclick="buildSubTabs('${lid}','${slid}','mcq');showSubAct('${lid}','${slid}','mcq')">Start Quiz →</button>`;
  return h;
}
function renderSubMCQ(lid,slid,el){
  const d=ds(slid,"mcq"),qs=getQs(slid,"mcq");
  if(d.done){el.innerHTML=subDoneBanner(slid,"mcq",d.score,qs.length,"fill");return;}
  const q=qs[d.qi];
  let h=`<div class="qwrap"><div class="qwrap-top"><div class="qwrap-title">❓ Quiz</div><div class="qright"><div class="qcounter">${d.qi+1}/${qs.length}</div></div></div><div class="qprog"><div class="qprog-fill" style="width:${(d.qi/qs.length)*100}%"></div></div><div class="q-text">${hl(q.q)}</div><div class="mcq-opts">`;
  q.opts.forEach((o,i)=>{let cls="mcq-opt";if(d.ans){if(i===q.ans)cls+=" correct";else if(i===d.sel&&i!==q.ans)cls+=" wrong";}else if(i===d.sel)cls+=" sel";h+=`<div class="${cls}" ${d.ans?"":"onclick=\"smSel('"+slid+"',"+i+")\""}><div class="opt-key">${String.fromCharCode(65+i)}</div>${o}</div>`;});
  h+=`</div>`;
  if(d.fb)h+=`<div class="fb fb-${d.fb.t}"><div class="fb-icon">${d.fb.t==="ok"?"✅":"❌"}</div><div>${hl(d.fb.m)}</div></div>`;
  h+=`<div class="btn-row">`;
  if(!d.ans)h+=`<button class="btn primary" onclick="smChk('${slid}','${lid}')">Check ✓</button>`;
  if(d.ans&&d.qi<qs.length-1)h+=`<button class="btn primary" onclick="smNext('${slid}','${lid}')">Next →</button>`;
  if(d.ans&&d.qi===qs.length-1)h+=`<button class="btn success" onclick="smNext('${slid}','${lid}')">Finish 🎉</button>`;
  h+=`</div></div>`;el.innerHTML=h;
}
function smSel(slid,i){const d=ds(slid,"mcq");if(d.ans)return;d.sel=i;d.fb=null;rerenderSub(slid,"mcq");}
function smChk(slid,lid){const d=ds(slid,"mcq"),qs=getQs(slid,"mcq"),q=qs[d.qi];if(d.sel===null){d.fb={t:"info",m:"Select an answer first."};rerenderSub(slid,"mcq");return;}const ok=d.sel===q.ans;d.ans=true;d.fb={t:ok?"ok":"bad",m:q.exp};if(ok){d.score++;addXP(8);}rerenderSub(slid,"mcq");}
function smNext(slid,lid){const d=ds(slid,"mcq"),qs=getQs(slid,"mcq");if(d.qi<qs.length-1){d.qi++;d.ans=false;d.sel=null;d.fb=null;rerenderSub(slid,"mcq");}else{d.done=true;markActDone(slid,"mcq",d.score,qs.length);buildSubTabs(lid,slid,"mcq");rerenderSub(slid,"mcq");}}
function renderSubFill(lid,slid,el){
  const d=ds(slid,"fill"),qs=getQs(slid,"fill");
  if(d.done){el.innerHTML=subDoneBanner(slid,"fill",d.score,qs.length,null);return;}
  const q=qs[d.qi],v=d.fv||"";
  let ic="fill-inp"+(d.ans?(d.fb&&d.fb.t==="ok"?" ok":" bad"):"");
  let h=`<div class="qwrap"><div class="qwrap-top"><div class="qwrap-title">✏️ Fill in the blank</div><div class="qright"><div class="qcounter">${d.qi+1}/${qs.length}</div></div></div><div class="qprog"><div class="qprog-fill" style="width:${(d.qi/qs.length)*100}%"></div></div><div class="q-text">Complete the sentence.</div><div class="fill-sent">${hl(q.b)} <input id="sfi" type="text" class="${ic}" placeholder="${q.h}" value="${v}" ${d.ans?"readonly":""} oninput="sfType('${slid}',this.value)" onkeydown="if(event.key==='Enter'&&!${d.ans})sfChk('${slid}','${lid}')"/> ${hl(q.a)}</div><div class="hint-tag">Hint: ${q.h}</div>`;
  if(d.fb)h+=`<div class="fb fb-${d.fb.t}"><div class="fb-icon">${d.fb.t==="ok"?"✅":"❌"}</div><div>${hl(d.fb.m)}</div></div>`;
  h+=`<div class="btn-row">`;
  if(!d.ans)h+=`<button class="btn primary" onclick="sfChk('${slid}','${lid}')">Check ✓</button>`;
  if(d.ans&&d.qi<qs.length-1)h+=`<button class="btn primary" onclick="sfNext('${slid}','${lid}')">Next →</button>`;
  if(d.ans&&d.qi===qs.length-1)h+=`<button class="btn success" onclick="sfNext('${slid}','${lid}')">Finish 🎉</button>`;
  h+=`</div></div>`;el.innerHTML=h;
  const inp=document.getElementById("sfi");if(inp&&!d.ans)setTimeout(()=>inp.focus(),80);
}
function sfType(slid,v){ds(slid,"fill").fv=v;}
function sfChk(slid,lid){const d=ds(slid,"fill"),qs=getQs(slid,"fill"),q=qs[d.qi];const v=(d.fv||"").trim().toLowerCase();if(!v){d.fb={t:"info",m:"Type an answer first."};rerenderSub(slid,"fill");return;}const ok=q.ac.map(a=>a.toLowerCase()).some(a=>a===v||v.includes(a)||a.includes(v)&&v.length>3);d.ans=true;d.fb={t:ok?"ok":"bad",m:ok?"Correct! "+q.ex:"A good answer: \""+q.ac[0]+"\". "+q.ex};if(ok){d.score++;addXP(8);}rerenderSub(slid,"fill");}
function sfNext(slid,lid){const d=ds(slid,"fill"),qs=getQs(slid,"fill");if(d.qi<qs.length-1){d.qi++;d.ans=false;d.fv="";d.fb=null;rerenderSub(slid,"fill");}else{d.done=true;markActDone(slid,"fill",d.score,qs.length);buildSubTabs(lid,slid,"fill");rerenderSub(slid,"fill");}}
function rerenderSub(slid,act){const p=document.getElementById("sub-panels");if(!p)return;if(act==="mcq")renderSubMCQ(curL,slid,p);else if(act==="fill")renderSubFill(curL,slid,p);}
function subDoneBanner(slid,act,score,total,nextAct){
  const pct=Math.round((score/total)*100),em=pct===100?"🏆":pct>=70?"🎉":"💪";
  let btn=nextAct?`<button class="btn primary" onclick="buildSubTabs('${curL}','${slid}','${nextAct}');showSubAct('${curL}','${slid}','${nextAct}')">Next: Fill Blank →</button>`:`<button class="btn success" onclick="closeSubLesson()">← Back to Lesson</button>`;
  return `<div class="done-card"><div class="done-emoji">${em}</div><div class="done-title">${pct===100?"Perfect!":pct>=70?"Great work!":"Keep going!"}</div><div class="done-score">${score}/${total} · ${pct}%</div><div class="done-sub">${pct===100?"Excellent work.":pct>=70?"Review any misses.":"Every attempt builds skill."}</div><div class="btn-row" style="justify-content:center"><button class="btn" onclick="resetDS('${slid}','${act}');rerenderSub('${slid}','${act}')">↺ Retry</button>${btn}</div></div>`;
}

function buildHome(){
  const el=document.getElementById("h-xp");if(el)el.textContent=ST.xp;
  ensureDailyFields();
  const sEl=document.getElementById("h-streak");if(sEl)sEl.textContent=ST.streak||0;
  const lv=getLevel(ST.xp),nextLv=LEVELS[lv.idx+1];
  const xpIn=ST.xp-lv.min,xpTo=nextLv?nextLv.min-lv.min:1;
  const lvPct=nextLv?Math.round((xpIn/xpTo)*100):100;
  const total=PHASES.flatMap(p=>p.lessons).length;
  const pct=Math.round((ST.completed.length/total)*100);
  const streak=ST.streak||0,dXP=ST.dailyXP.xp,gXP=ST.goalXP||50,goalPct=Math.min(100,Math.round((dXP/gXP)*100)),daysLeft=daysToTarget(),todaySec=ST.studySeconds.today;
  document.getElementById("home-body").innerHTML=`
    <div class="welcome">
      <div class="welcome-title">Welcome back, Mohammad 👋</div>
      <div class="welcome-sub">Every lesson brings you closer to the classroom.</div>
      <div class="prog-row"><span>Overall Progress</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-ico">🔥</div><div class="stat-val">${streak}</div><div class="stat-lbl">Day streak</div></div>
      <div class="stat-card"><div class="goal-ring" style="--p:${goalPct}"><div class="goal-ring-inner">${goalPct}%</div></div><div class="stat-val" style="font-size:13px">${dXP}/${gXP} XP</div><div class="stat-lbl">Daily goal</div></div>
      <div class="stat-card"><div class="stat-ico">${daysLeft>0?"⏳":"🎓"}</div><div class="stat-val">${daysLeft>0?daysLeft:"✓"}</div><div class="stat-lbl">${daysLeft>0?"Days to Aug 6":"Target reached"}</div></div>
      <div class="stat-card"><div class="stat-ico">⏱️</div><div class="stat-val" style="font-size:15px">${fmtStudyTime(todaySec)}</div><div class="stat-lbl">Studied today</div></div>
    </div>
    <div class="level-strip">
      <div class="level-emoji">${lv.emoji}</div>
      <div class="level-info">
        <div class="level-name">${lv.name}</div>
        <div class="level-xp-row">${ST.xp} XP${nextLv?" · "+nextLv.min+" to next level":""}</div>
        <div class="level-track"><div class="level-fill" style="width:${lvPct}%;background:${lv.color}"></div></div>
      </div>
    </div>
    ${PHASES.map((ph,phi)=>`
      <div class="phase-divider">${ph.label}</div>
      <div class="lessons-grid">
      ${ph.lessons.map(l=>{
        const done=ST.completed.includes(l.id);
        const mast=lessonMastery(l.id);
        const comp=lessonCompletion(l.id);
        const cls=`lesson-card${done?" done":l.unlocked?"":" locked"}`;
        const pillCls=comp.pct===100?"done":comp.pct>0?"part":"none";
        const pillLabel=done?"✓ Complete":comp.pct>0?`${comp.done}/${comp.total} activities · ${comp.pct}%`:"Not started";
        return `<div class="${cls}" ${(l.unlocked||done)?`onclick="openLesson('${l.id}')"`:""}>
          <div class="l-icon ${l.color}">${l.icon}</div>
          <div class="l-info"><div class="l-num">Lesson ${l.num}</div><div class="l-title">${l.title}</div><div class="l-sub">${l.sub}</div><div class="comp-pill ${pillCls}">${pillLabel}</div>${mast>0?`<div class="mastery-bar" style="margin-top:5px"><div class="mastery-fill" style="width:${mast}%;background:${masteryColor(mast)}"></div></div>`:""}</div>
          <div class="l-badge ${done?"done":l.unlocked?"go":"lock"}">${done?"✓":l.unlocked?"→":"🔒"}</div>
        </div>`;
      }).join("")}
      </div>
      ${phaseExamReady(phi)?examCardHTML(phi,ph):""}
    `).join("")}
    <div style="height:24px"></div>`;
  buildSidebar();
}
function buildSidebar(){
  const sb=document.getElementById("sidebar");if(!sb)return;
  const lv=getLevel(ST.xp),nextLv=LEVELS[lv.idx+1];
  const xpIn=ST.xp-lv.min,xpTo=nextLv?nextLv.min-lv.min:1;
  const pct=nextLv?Math.round((xpIn/xpTo)*100):100;
  const t=document.documentElement.getAttribute('data-theme')||'light';
  let h=`<div class="sb-top"><div class="sb-logo">English<span>.</span></div><button class="theme-btn" onclick="toggleTheme()">${t==='dark'?'☀️':'🌙'}</button></div>`;
  h+=`<div class="sb-level-wrap"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:20px">${lv.emoji}</span><div><div class="sb-level-name">${lv.name}</div><div class="sb-level-xp">${ST.xp} XP${nextLv?" · "+nextLv.min+" to "+nextLv.name:""}</div></div></div><div class="sb-prog-track"><div class="sb-prog-fill" style="width:${pct}%;background:${lv.color}"></div></div></div>`;
  ensureDailyFields();
  const sStreak=ST.streak||0,sDaysLeft=daysToTarget(),sDXP=ST.dailyXP.xp,sGXP=ST.goalXP||50,sGoalPct=Math.min(100,Math.round((sDXP/sGXP)*100));
  h+=`<div class="sb-stats"><div class="sb-stat">🔥<b>${sStreak}</b><span>day streak</span></div><div class="sb-stat">${sDaysLeft>0?"⏳":"🎓"}<b>${sDaysLeft>0?sDaysLeft:"✓"}</b><span>${sDaysLeft>0?"days left":"target"}</span></div></div>`;
  h+=`<div class="sb-goal-wrap"><div class="sb-goal-top"><span>Daily goal</span><span>${sDXP}/${sGXP} XP</span></div><div class="sb-goal-track"><div class="sb-goal-fill" style="width:${sGoalPct}%"></div></div></div>`;
  h+=`<div class="sb-lessons">`;
  PHASES.forEach((ph,phi)=>{
    h+=`<div class="sb-phase">${ph.label}</div>`;
    ph.lessons.forEach(l=>{
      const done=ST.completed.includes(l.id),mast=lessonMastery(l.id),isAct=curL===l.id;
      const comp=lessonCompletion(l.id);
      let cls="sb-lesson"+(isAct?" sb-active":"")+((!l.unlocked&&!done)?" sb-locked":"");
      h+=`<div class="${cls}" ${(l.unlocked||done)?`onclick="openLesson('${l.id}')"`:""}>`;
      h+=`<span class="sb-l-icon">${l.icon}</span><div class="sb-l-info"><div class="sb-l-name">${l.title}</div>`;
      if(done)h+=`<div class="sb-l-pct" style="color:var(--green)">✓ Complete · ${mast>0?mast+"% mastery":""}</div>`;
      else if(comp.pct>0)h+=`<div class="sb-l-pct" style="color:var(--primary)">${comp.done}/${comp.total} done · ${mast>0?mast+"% mastery":""}</div>`;
      h+=`</div>${done?'<span class="sb-l-check">✓</span>':""}</div>`;
    });
    if(phaseExamReady(phi)){
      const ex=ST.exam&&ST.exam["p"+phi],passed=ex&&ex.passed;
      h+=`<div class="sb-exam${passed?" passed":""}" onclick="openExam(${phi})"><span class="sb-l-icon">${passed?"🏅":"📝"}</span><div class="sb-l-info"><div class="sb-l-name">Final Exam</div><div class="sb-l-pct">${ex?(passed?"Passed · best "+ex.best+"%":"Best "+ex.best+"% · pass 80%"):"50 questions · pass 80%"}</div></div><span class="sb-l-check" style="color:var(--primary)">→</span></div>`;
    }
  });
  h+=`</div>`;
  sb.innerHTML=h;
}

function toast(msg){const el=document.getElementById("toast-el");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2800);}
function toggleTheme(){const dark=document.documentElement.getAttribute('data-theme')==='dark';const t=dark?'light':'dark';document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('em_theme',t);}catch(e){}document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=t==='dark'?'☀️':'🌙');buildSidebar();}
(function(){const t=document.documentElement.getAttribute('data-theme')||'light';document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=t==='dark'?'☀️':'🌙');})();
initApp();
</script>
</body>
</html>
